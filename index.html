// ── FINANCE DASHBOARD ────────────────────────────────────────────────────────
const PER_DIEM_DAILY = 100;   // EUR por pessoa por dia (estimativa)

function FinanceDashboard({ team, agenda, pitchData, logistics, setLogistics, simulador, setSimulador }) {
  const flights = logistics.flights || [];
  const hotels  = logistics.hotels  || [];
  const [showResumo, setShowResumo] = useState(true);
  const [showPitch,  setShowPitch]  = useState(false);
  const [finSubTab,  setFinSubTab]  = useState("dashboard"); // "dashboard" | "simulador"
  const [usdEurRate, setUsdEurRate] = useState(0.92);
  const [rateStatus, setRateStatus] = useState("loading"); // "loading"|"live"|"fallback"

  // Fetch live USD→EUR rate from Frankfurter (free, no key)
  useEffect(() => {
    fetch("https://api.frankfurter.app/latest?from=USD&to=EUR")
      .then(r => r.json())
      .then(data => {
        if (data?.rates?.EUR) {
          setUsdEurRate(parseFloat(data.rates.EUR.toFixed(4)));
          setRateStatus("live");
        } else setRateStatus("fallback");
      })
      .catch(() => setRateStatus("fallback"));
  }, []);

  const USD_EUR_RATE = usdEurRate;

  // ── EDITORIAL ──
  const realEntries = agenda.filter(e => e.personId !== "__team__");
  const countType   = t => realEntries.filter(e => e.type === t).length;
  const gamesInLoco = Object.values(pitchData).filter(v => v.inLoco).length;
  const nDireto     = countType("direto");
  const nGravacao   = countType("gravacao");
  const nRedes      = countType("redes");
  const nComercial  = countType("comercial");
  const nJogo       = countType("jogo");
  const nTreino     = countType("treino");
  const totalContent= nDireto + nGravacao + nRedes + nComercial;

  // ── PITCH POSITIONS (USD) ──
  const inLocoEntries = Object.entries(pitchData).filter(([,v]) => v.inLoco);
  let totalPitchUSD = 0;
  inLocoEntries.forEach(([, matchData]) => {
    Object.keys(matchData.positions || {}).forEach(posId => {
      const pos = PITCH_POSITIONS_CATALOG.find(p => p.id === posId);
      if (pos) totalPitchUSD += pos.price;
    });
  });

  // ── LOGISTICS (EUR) ──
  const totalHotelEUR     = hotels.reduce((s, h) => s + (h.price || 0), 0);
  const totalFlightsEUR   = flights.reduce((s, f) => s + flightCost(f), 0);
  const transport         = logistics.transport || {};
  const totalTransportEUR = Object.values(transport).reduce((s,t) => s + (t.cost||0), 0);
  let totalPersonNights = 0;
  hotels.forEach(h => {
    const nights  = logNights(h.checkIn, h.checkOut);
    const persons = (h.personIds || []).length || 1;
    totalPersonNights += nights * persons;
  });
  const totalPerDiemEUR   = totalPersonNights * PER_DIEM_DAILY;
  const totalLogisticsEUR = totalHotelEUR + totalFlightsEUR + totalPerDiemEUR + totalTransportEUR;

  // Per-person cost (proportional share of flights + hotels)
  const personCosts = {};
  team.forEach(p => { personCosts[p.id] = { hotel: 0, flight: 0 }; });
  flights.forEach(f => {
    const share = f.pricePerPerson > 0 ? (f.pricePerPerson||0) : (f.price||0) / Math.max(1,(f.personIds||[]).length);
    (f.personIds || []).forEach(pid => { if (personCosts[pid]) personCosts[pid].flight += share; });
  });
  hotels.forEach(h => {
    const share = (h.price || 0) / Math.max(1, (h.personIds || []).length);
    (h.personIds || []).forEach(pid => { if (personCosts[pid]) personCosts[pid].hotel += share; });
  });
  const maxPersonCost = Math.max(1, ...team.map(p => {
    const c = personCosts[p.id] || { hotel:0, flight:0 };
    return c.hotel + c.flight;
  }));

  // ── PHASE RANGES (computed dynamically from FIFA_MATCHES) ──
  const PHASE_DEFS = [
    { id:"pre_group", label:"Pré-Copa + Fase de Grupos", stages:["Group Stage"],                       fixedStart:"2026-06-08" },
    { id:"r16",       label:"16 Avos",                   stages:["16th Finals"] },
    { id:"r8",        label:"Oitavas de Final",          stages:["8th Finals"] },
    { id:"qf",        label:"Quartas de Final",          stages:["Quarter-finals"] },
    { id:"sf",        label:"Semifinais",                stages:["Semi-finals","3rd Place Final"] },
    { id:"final",     label:"Final",                     stages:["Final"] },
  ];
  const phaseRanges = {};
  PHASE_DEFS.forEach((ph, i) => {
    const dates = FIFA_MATCHES.filter(m => ph.stages.includes(m.stage)).map(m => m.date).sort();
    if (!dates.length) return;
    const endDate = dates[dates.length - 1];
    let startDate = ph.fixedStart || null;
    if (!startDate && i > 0) {
      const prevEnd = phaseRanges[PHASE_DEFS[i-1].id]?.end;
      if (prevEnd) {
        const d = new Date(prevEnd + "T12:00:00Z");
        d.setDate(d.getDate() + 1);
        startDate = d.toISOString().slice(0, 10);
      }
    }
    if (!startDate) startDate = dates[0];
    phaseRanges[ph.id] = { start: startDate, end: endDate, label: ph.label };
  });

  function getPhaseForDate(date) {
    if (!date) return null;
    for (const ph of PHASE_DEFS) {
      const r = phaseRanges[ph.id];
      if (r && date >= r.start && date <= r.end) return ph.id;
    }
    return null;
  }

  function hotelNightsInPhase(hotel, phId) {
    const r = phaseRanges[phId];
    if (!r || !hotel.checkIn || !hotel.checkOut) return 0;
    const s = hotel.checkIn  > r.start ? hotel.checkIn  : r.start;
    const e = hotel.checkOut < r.end   ? hotel.checkOut : r.end;
    if (s >= e) return 0;
    const d1 = new Date(s + "T12:00:00Z"), d2 = new Date(e + "T12:00:00Z");
    return Math.max(0, Math.round((d2 - d1) / 86400000));
  }

  const phaseCosts = {};
  PHASE_DEFS.forEach(ph => { phaseCosts[ph.id] = { flight:0, hotel:0, perDiem:0, pitch:0, transport:0, sinFlight:0, sinHotel:0, sinPerDiem:0, sinPitch:0 }; });

  // Identify sinergia persons by name match
  const SINERGIA_NAMES = ["quaresma","rui pedro","rodrigo alves","rodrigo"];
  const sinergiaTeam = team.filter(p => SINERGIA_NAMES.some(n => p.name.toLowerCase().includes(n)));
  const sinergiaIds  = new Set(sinergiaTeam.map(p => p.id));

  flights.forEach(f => {
    const phId = getPhaseForDate(f.date);
    if (!phId) return;
    const total = flightCost(f);
    phaseCosts[phId].flight += total;
    // Sinergia share for this flight: sum of per-person cost of sinergia people / 2
    const ppp = f.pricePerPerson > 0 ? (f.pricePerPerson||0) : (f.price||0) / Math.max(1,(f.personIds||[]).length);
    const sinCount = (f.personIds||[]).filter(id => sinergiaIds.has(id)).length;
    phaseCosts[phId].sinFlight += (ppp * sinCount) / 2;
  });

  hotels.forEach(h => {
    const totalNights = logNights(h.checkIn, h.checkOut) || 1;
    const persons     = (h.personIds || []).length || 1;
    const sinPersons  = (h.personIds || []).filter(id => sinergiaIds.has(id)).length;
    PHASE_DEFS.forEach(ph => {
      const nights = hotelNightsInPhase(h, ph.id);
      if (!nights) return;
      const hotelShare  = (h.price || 0) * (nights / totalNights);
      const perDiemShare = nights * persons * PER_DIEM_DAILY;
      phaseCosts[ph.id].hotel   += hotelShare;
      phaseCosts[ph.id].perDiem += perDiemShare;
      // Sinergia: proportional hotel cost for sinergia persons / 2
      const perPersonHotel = persons > 0 ? hotelShare / persons : 0;
      phaseCosts[ph.id].sinHotel   += (perPersonHotel * sinPersons) / 2;
      phaseCosts[ph.id].sinPerDiem += (nights * sinPersons * PER_DIEM_DAILY) / 2;
    });
  });

  // Transport por fase — registo real diário
  Object.entries(transport).forEach(([date, t]) => {
    const phId = getPhaseForDate(date);
    if (phId) phaseCosts[phId].transport += (t.cost || 0);
  });

  // IDs das pitch positions que entram na sinergia Portugal-Brasil
  const SINERGIA_PITCH_IDS = ["touchline_partial","touchline_knockout","centre_circle"];

  inLocoEntries.forEach(([matchId, matchData]) => {
    const match = FIFA_MATCHES.find(m => String(m.id) === String(matchId));
    if (!match) return;
    const phId = getPhaseForDate(match.date);
    if (!phId) return;
    const isPortugal = match.home === "Portugal" || match.away === "Portugal";
    Object.keys(matchData.positions || {}).forEach(posId => {
      const pos = PITCH_POSITIONS_CATALOG.find(p => p.id === posId);
      if (!pos) return;
      phaseCosts[phId].pitch += pos.price;
      if (isPortugal && SINERGIA_PITCH_IDS.includes(posId)) {
        phaseCosts[phId].sinPitch += pos.price / 2;
      }
    });
  });

  // ── CITY COSTS (excl. pitch positions) ──
  const cityCosts = {};
  hotels.forEach(h => {
    const c = h.city || "Desconhecida";
    if (!cityCosts[c]) cityCosts[c] = { hotel:0, perDiem:0 };
    const nights  = logNights(h.checkIn, h.checkOut);
    const persons = (h.personIds || []).length || 1;
    cityCosts[c].hotel   += (h.price || 0);
    cityCosts[c].perDiem += nights * persons * PER_DIEM_DAILY;
  });
  const maxCityTotal  = Math.max(1, ...Object.values(cityCosts).map(c => c.hotel + c.perDiem));
  const totalPitchEUR = totalPitchUSD * USD_EUR_RATE;
  const grandTotalEUR = totalLogisticsEUR + totalPitchEUR;

  // ── CUSTOS COMPARTILHADOS ──
  // Pessoas cujos custos são partilhados (÷2) com entidade externa
  const SHARED_NAMES = ["quaresma","rui pedro","rodrigo alves","rodrigo"];
  const sharedTeam   = team.filter(p => SHARED_NAMES.some(n => p.name.toLowerCase().includes(n)));

  // Custos de logística das pessoas partilhadas (÷2)
  let sharedFlightEUR = 0, sharedHotelEUR = 0, sharedPerDiemEUR = 0;
  sharedTeam.forEach(p => {
    flights.forEach(f => {
      if ((f.personIds||[]).includes(p.id)) {
        const ppp = f.pricePerPerson > 0 ? (f.pricePerPerson||0) : (f.price||0)/Math.max(1,(f.personIds||[]).length);
        sharedFlightEUR += ppp;
      }
    });
    hotels.forEach(h => {
      if ((h.personIds||[]).includes(p.id)) {
        const share  = (h.price||0) / Math.max(1,(h.personIds||[]).length);
        const nights = logNights(h.checkIn, h.checkOut);
        sharedHotelEUR   += share;
        sharedPerDiemEUR += nights * PER_DIEM_DAILY;
      }
    });
  });
  sharedFlightEUR  /= 2;
  sharedHotelEUR   /= 2;
  sharedPerDiemEUR /= 2;

  // Custos de Pitch dos jogos de Portugal (Presentation Position + Centre Circle) ÷2
  const SHARED_PITCH_IDS  = ["touchline_partial","touchline_knockout","centre_circle"];
  let sharedPitchUSD = 0;
  inLocoEntries.forEach(([matchId, matchData]) => {
    const match = FIFA_MATCHES.find(m => String(m.id) === String(matchId));
    if (!match) return;
    if (match.home !== "Portugal" && match.away !== "Portugal") return;
    SHARED_PITCH_IDS.forEach(posId => {
      if (matchData.positions?.[posId]) {
        const pos = PITCH_POSITIONS_CATALOG.find(p => p.id === posId);
        if (pos) sharedPitchUSD += pos.price;
      }
    });
  });
  sharedPitchUSD /= 2;
  const sharedPitchEUR  = sharedPitchUSD * USD_EUR_RATE;
  const sharedTotalEUR  = sharedFlightEUR + sharedHotelEUR + sharedPerDiemEUR + sharedPitchEUR;

  // ── HELPERS ──
  const fmtUSD = n => "$" + Math.round(n).toLocaleString("pt-PT");
  const fmtEUR = n => "€" + Math.round(n).toLocaleString("pt-PT");

  function Bar({ value, max, color, color2, value2 }) {
    const pct  = max > 0 ? Math.min(100, (value  / max) * 100) : 0;
    const pct2 = max > 0 ? Math.min(100, (value2 / max) * 100) : 0;
    if (color2 !== undefined) {
      return (
        <div className="h-2 bg-slate-700 rounded-full overflow-hidden flex">
          <div style={{ width: `${pct}%`,  background: color  }} className="h-full"/>
          <div style={{ width: `${pct2}%`, background: color2 }} className="h-full"/>
        </div>
      );
    }
    return (
      <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
        <div style={{ width: `${pct}%`, background: color }} className="h-full rounded-full"/>
      </div>
    );
  }

  function KpiCard({ emoji, label, value, sub, color }) {
    return (
      <div className="bg-slate-800 border border-slate-700 rounded-2xl p-4 flex flex-col gap-1">
        <div className="text-xl">{emoji}</div>
        <div className="text-xl font-bold leading-tight" style={{ color }}>{value}</div>
        <div className="text-xs text-slate-300 leading-snug">{label}</div>
        {sub && <div className="text-xs text-slate-500 mt-0.5">{sub}</div>}
      </div>
    );
  }

  function SectionTitle({ children, total }) {
    return (
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-xs font-semibold text-slate-400 uppercase tracking-widest">{children}</h2>
        {total !== undefined && <span className="text-base font-bold text-white">{total}</span>}
      </div>
    );
  }

  return (
    <div className="space-y-5 pb-10">

      {/* Sub-tab toggle */}
      <div className="flex bg-slate-800 border border-slate-700 rounded-xl p-0.5 gap-0.5">
        {[
          {id:"dashboard", emoji:"📊", label:"Dashboard"},
          {id:"simulador", emoji:"🔮", label:"Simulador Eliminatória"},
        ].map(t=>(
          <button key={t.id} onClick={()=>setFinSubTab(t.id)}
            className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-medium transition-all ${finSubTab===t.id?"bg-emerald-600 text-white":"text-slate-400 hover:text-slate-200"}`}>
            {t.emoji} {t.label}
          </button>
        ))}
      </div>

      {/* ── SIMULADOR ── */}
      {finSubTab==="simulador" && (
        <Simulador team={team} logistics={logistics} pitchData={pitchData} usdEurRate={usdEurRate} simulador={simulador} setSimulador={setSimulador}
          phase1Bruto={grandTotalEUR} phase1Sin={sharedTotalEUR}/>
      )}

      {/* ── DASHBOARD ── */}
      {finSubTab==="dashboard" && (<>

      {/* Header */}
      <div className="flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 rounded-2xl px-4 py-3">
        <span className="text-2xl">📊</span>
        <div>
          <div className="font-bold text-amber-300 text-base leading-tight">Dashboard Financeiro &amp; Editorial</div>
          <div className="text-xs text-amber-400/70">Acesso exclusivo admin · Calculado em tempo real</div>
        </div>
      </div>

      {/* ── 1. RESUMO FINANCEIRO GLOBAL (topo, collapsible) ── */}
      <section>
        <button onClick={() => setShowResumo(v => !v)}
          className="w-full flex items-center justify-between bg-gradient-to-br from-slate-800 to-slate-900 border border-amber-700/40 rounded-2xl px-5 py-4 text-left transition-all hover:border-amber-500/60">
          <div className="flex items-center gap-2">
            <span className="text-lg">💰</span>
            <span className="text-sm font-semibold text-slate-200">Resumo Financeiro Global</span>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-amber-400 font-bold text-sm">{fmtEUR(grandTotalEUR)}</span>
            <span className="text-slate-400 text-sm">{showResumo ? "▲" : "▼"}</span>
          </div>
        </button>
        {showResumo && (
          <div className="bg-gradient-to-br from-slate-800 to-slate-900 border border-amber-700/40 border-t-0 rounded-b-2xl px-5 pb-5 pt-4 space-y-2.5 -mt-1">
            <div className="flex justify-between items-center py-1">
              <span className="text-slate-300 text-sm">✈️ Viagens</span>
              <span className="text-blue-400 font-bold">{fmtEUR(totalFlightsEUR)}</span>
            </div>
            <div className="flex justify-between items-center py-1">
              <span className="text-slate-300 text-sm">🏨 Hotéis</span>
              <span className="text-amber-400 font-bold">{fmtEUR(totalHotelEUR)}</span>
            </div>
            <div className="flex justify-between items-center py-1">
              <span className="text-slate-300 text-sm">🍽️ Per Diem estimado</span>
              <span className="text-green-400 font-bold">{fmtEUR(totalPerDiemEUR)}</span>
            </div>
            {totalTransportEUR > 0 && (
              <div className="flex justify-between items-center py-1">
                <span className="text-slate-300 text-sm">🚐 Transporte interno</span>
                <span className="text-orange-400 font-bold">{fmtEUR(totalTransportEUR)}</span>
              </div>
            )}
            {totalPitchUSD > 0 && (
              <div className="flex justify-between items-center py-1">
                <span className="text-slate-300 text-sm">🎙️ Pitch Positions <span className="text-slate-500 text-xs">({fmtUSD(totalPitchUSD)} × {USD_EUR_RATE})</span></span>
                <span className="text-violet-400 font-bold">{fmtEUR(totalPitchEUR)}</span>
              </div>
            )}
            <div className="border-t border-slate-600 pt-3 flex justify-between items-center">
              <div>
                <div className="text-slate-200 font-semibold">🧮 Total Geral (EUR)</div>
                <div className="text-xs text-slate-500">logística + pitch (câmbio {USD_EUR_RATE})</div>
              </div>
              <span className="text-white font-bold text-xl">{fmtEUR(grandTotalEUR)}</span>
            </div>
            <div className="text-xs text-slate-600 pt-1">
              * Per diem €{PER_DIEM_DAILY}/pessoa/dia. Câmbio USD→EUR: {USD_EUR_RATE}
              {rateStatus==="live"
                ? <span className="text-emerald-600 ml-1">✓ taxa ao vivo</span>
                : rateStatus==="loading"
                ? <span className="text-slate-600 ml-1">a carregar…</span>
                : <span className="text-amber-600 ml-1">⚠ taxa de reserva (sem internet)</span>}
            </div>
          </div>
        )}
      </section>

      {/* ── 2. CUSTO POR FASE ── */}
      <section>
        <SectionTitle>📅 Custo por Fase</SectionTitle>

        {/* Legend */}
        <div className="flex gap-4 text-xs text-slate-500 mb-3 px-1 flex-wrap">
          <span><span className="text-white font-semibold">Total</span> = custo completo da fase</span>
          <span><span className="text-emerald-400 font-semibold">Sinergia BR</span> = desconto ÷2 de {sinergiaTeam.map(p=>p.name.split(" ")[0]).join(", ") || "Quaresma, Rui Pedro, Rodrigo"}</span>
        </div>

        <div className="space-y-2">
          {PHASE_DEFS.filter(ph => {
            const c = phaseCosts[ph.id];
            return c && (c.flight + c.hotel + c.perDiem + c.pitch + c.transport) > 0;
          }).map(ph => {
            const c = phaseCosts[ph.id];
            const eurTotal   = c.flight + c.hotel + c.perDiem + c.pitch * USD_EUR_RATE + c.transport;
            const sinTotal   = c.sinFlight + c.sinHotel + c.sinPerDiem + c.sinPitch * USD_EUR_RATE;
            const netTotal   = eurTotal - sinTotal;
            const r = phaseRanges[ph.id];
            return (
              <div key={ph.id} className="bg-slate-800 border border-slate-700 rounded-2xl p-4">
                {/* Phase header */}
                <div className="flex justify-between items-start mb-3">
                  <div>
                    <div className="text-sm font-semibold text-slate-200">{ph.label}</div>
                    {r && <div className="text-xs text-slate-500 mt-0.5">{r.start} → {r.end}</div>}
                  </div>
                  <div className="text-right shrink-0 ml-3">
                    <div className="text-white font-bold text-sm">{fmtEUR(eurTotal)}</div>
                    {sinTotal > 0 && (
                      <div className="text-emerald-400 text-xs font-semibold mt-0.5">
                        -{fmtEUR(sinTotal)} sin.
                      </div>
                    )}
                  </div>
                </div>

                {/* Breakdown rows */}
                <div className="border-t border-slate-700/50 pt-2 space-y-1.5">
                  {[
                    { label:"✈️ Aéreo",      total:c.flight,             sin:c.sinFlight,              color:"#3b82f6" },
                    { label:"🏨 Hospedagem", total:c.hotel,              sin:c.sinHotel,               color:"#f59e0b" },
                    { label:"🍽️ Per Diem",   total:c.perDiem,            sin:c.sinPerDiem,             color:"#10b981" },
                    { label:"🚐 Transporte", total:c.transport,          sin:0,                        color:"#f97316" },
                    { label:"🎙️ Pitch",      total:c.pitch*USD_EUR_RATE, sin:c.sinPitch*USD_EUR_RATE,  color:"#a78bfa",
                      sub: c.pitch>0 ? `${fmtUSD(c.pitch)}${c.sinPitch>0?" · -"+fmtUSD(c.sinPitch)+" sin.":""}` : "" },
                  ].filter(x => x.total > 0).map(x => (
                    <div key={x.label} className="flex items-center justify-between text-xs gap-2">
                      <span className="text-slate-400 shrink-0">
                        {x.label}{x.sub ? <span className="text-slate-600 ml-1">({x.sub})</span> : null}
                      </span>
                      <div className="flex items-center gap-3 shrink-0">
                        <span style={{color:x.color}} className="font-medium">{fmtEUR(x.total)}</span>
                        {x.sin > 0 && (
                          <span className="text-emerald-500 text-xs">-{fmtEUR(x.sin)}</span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Net total with sinergia */}
                {sinTotal > 0 && (
                  <div className="mt-3 pt-2.5 border-t border-emerald-700/30 flex justify-between items-center">
                    <span className="text-xs text-emerald-400 font-medium">💚 Total c/ Sinergia Brasil</span>
                    <span className="text-emerald-300 font-bold text-sm">{fmtEUR(netTotal)}</span>
                  </div>
                )}
              </div>
            );
          })}
          {PHASE_DEFS.every(ph => { const c = phaseCosts[ph.id]; return !c || (c.flight+c.hotel+c.perDiem+c.pitch+c.transport)===0; }) && (
            <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-slate-500 text-sm text-center">
              Sem dados financeiros ainda. Adicione voos, hotéis ou selecione jogos in loco.
            </div>
          )}
        </div>

        {/* Grand totals bar */}
        {PHASE_DEFS.some(ph => { const c = phaseCosts[ph.id]; return c && (c.flight+c.hotel+c.perDiem+c.pitch+c.transport)>0; }) && (
          <div className="mt-3 bg-slate-800 border border-slate-700 rounded-2xl p-4">
            <div className="flex justify-between items-center mb-1">
              <span className="text-xs text-slate-400 font-medium">Total geral de todas as fases</span>
            </div>
            {(() => {
              const allSin = PHASE_DEFS.reduce((s,ph) => {
                const c = phaseCosts[ph.id];
                return s + (c ? c.sinFlight + c.sinHotel + c.sinPerDiem + c.sinPitch * USD_EUR_RATE : 0);
              }, 0);
              return (
                <div className="flex flex-col gap-1.5">
                  <div className="flex justify-between text-sm">
                    <span className="text-slate-300">Custo total</span>
                    <span className="text-white font-bold">{fmtEUR(grandTotalEUR)}</span>
                  </div>
                  {allSin > 0 && (
                    <>
                      <div className="flex justify-between text-sm">
                        <span className="text-emerald-400">Desconto Sinergia Brasil</span>
                        <span className="text-emerald-400 font-bold">-{fmtEUR(allSin)}</span>
                      </div>
                      <div className="flex justify-between text-sm border-t border-slate-600 pt-1.5 mt-0.5">
                        <span className="text-slate-200 font-semibold">💚 Custo líquido c/ Sinergia</span>
                        <span className="text-emerald-300 font-bold">{fmtEUR(grandTotalEUR - allSin)}</span>
                      </div>
                    </>
                  )}
                </div>
              );
            })()}
          </div>
        )}
      </section>

      {/* ── 3. LOGÍSTICA (EUR) ── */}
      <section>
        <SectionTitle total={fmtEUR(totalLogisticsEUR)}>🗺️ Logística (EUR)</SectionTitle>
        <div className="grid grid-cols-3 gap-3 mb-3">
          <KpiCard emoji="✈️" label="Viagens"    value={fmtEUR(totalFlightsEUR)}   color="#3b82f6"
            sub={`${flights.length} voo${flights.length!==1?"s":""}`}/>
          <KpiCard emoji="🏨" label="Hotéis"     value={fmtEUR(totalHotelEUR)}     color="#f59e0b"
            sub={`${hotels.length} reserva${hotels.length!==1?"s":""}`}/>
          <KpiCard emoji="🍽️" label="Per Diem"  value={fmtEUR(totalPerDiemEUR)}   color="#10b981"
            sub={`${totalPersonNights} p·noite · €${PER_DIEM_DAILY}/dia`}/>
        </div>
        {totalTransportEUR > 0 && (
          <div className="grid grid-cols-1 gap-3 mb-3">
            <KpiCard emoji="🚐" label="Transporte Interno (real)" value={fmtEUR(totalTransportEUR)} color="#f97316"
              sub={`${Object.values(transport).filter(t=>t.cost>0).length} dias · média €${Math.round(totalTransportEUR/Math.max(1,Object.values(transport).filter(t=>t.cost>0).length))}/dia`}/>
          </div>
        )}
        {totalLogisticsEUR > 0 && (
          <div className="bg-slate-800 border border-slate-700 rounded-2xl p-4 mb-3">
            <div className="text-xs text-slate-400 mb-3 font-medium">Composição do orçamento logístico</div>
            <div className="space-y-2.5">
              {[
                {label:"✈️ Viagens",       cost:totalFlightsEUR,   color:"#3b82f6"},
                {label:"🏨 Hotéis",        cost:totalHotelEUR,     color:"#f59e0b"},
                {label:"🍽️ Per Diem",      cost:totalPerDiemEUR,   color:"#10b981"},
                {label:"🚐 Transporte",    cost:totalTransportEUR, color:"#f97316"},
              ].filter(x => x.cost > 0).map(x => (
                <div key={x.label}>
                  <div className="flex justify-between text-xs mb-1">
                    <span className="text-slate-300">{x.label}</span>
                    <span className="font-medium" style={{color:x.color}}>
                      {fmtEUR(x.cost)}
                      <span className="text-slate-500 ml-1.5">({totalLogisticsEUR>0?Math.round((x.cost/totalLogisticsEUR)*100):0}%)</span>
                    </span>
                  </div>
                  <Bar value={x.cost} max={totalLogisticsEUR} color={x.color}/>
                </div>
              ))}
            </div>
          </div>
        )}
        {team.length > 0 && (totalFlightsEUR + totalHotelEUR) > 0 && (
          <div className="bg-slate-800 border border-slate-700 rounded-2xl p-4 mb-3">
            <div className="text-xs text-slate-400 mb-3 font-medium">Custo por Pessoa (viagens + hotel, proporcional)</div>
            <div className="space-y-3">
              {team.map(p => {
                const pc    = personCosts[p.id] || { hotel:0, flight:0 };
                const total = pc.hotel + pc.flight;
                return (
                  <div key={p.id}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="flex items-center gap-1.5 text-slate-300">
                        <span className="text-base" style={{color:p.color}}>●</span>
                        {p.name}
                      </span>
                      <span className="text-slate-200 font-medium">{fmtEUR(total)}</span>
                    </div>
                    <Bar value={pc.flight} max={maxPersonCost} color="#3b82f6" color2="#f59e0b" value2={pc.hotel}/>
                  </div>
                );
              })}
              <div className="flex gap-4 text-xs text-slate-500 pt-1">
                <span><span className="text-blue-400 mr-1">■</span>Viagens</span>
                <span><span className="text-amber-400 mr-1">■</span>Hotel</span>
              </div>
            </div>
          </div>
        )}
        {Object.keys(cityCosts).length > 0 && (
          <div className="bg-slate-800 border border-slate-700 rounded-2xl p-4">
            <div className="text-xs text-slate-400 mb-3 font-medium">Custo por Cidade (hotel + per diem)</div>
            <div className="space-y-3">
              {Object.entries(cityCosts).sort((a,b)=>(b[1].hotel+b[1].perDiem)-(a[1].hotel+a[1].perDiem)).map(([city,c])=>{
                const total=c.hotel+c.perDiem;
                const maxH=maxCityTotal>0?Math.min(100,(c.hotel/maxCityTotal)*100):0;
                const maxP=maxCityTotal>0?Math.min(100,(c.perDiem/maxCityTotal)*100):0;
                return (
                  <div key={city}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="text-slate-300">📍 {city}</span>
                      <span className="text-white font-medium">{fmtEUR(total)}</span>
                    </div>
                    <div className="h-2.5 bg-slate-700 rounded-full overflow-hidden flex">
                      <div style={{width:`${maxH}%`,background:"#f59e0b"}} className="h-full"/>
                      <div style={{width:`${maxP}%`,background:"#10b981"}} className="h-full"/>
                    </div>
                    <div className="flex justify-between text-xs text-slate-500 mt-0.5">
                      <span>🏨 {fmtEUR(c.hotel)}</span><span>🍽️ {fmtEUR(c.perDiem)}</span>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="flex gap-4 text-xs text-slate-600 mt-3 pt-2 border-t border-slate-700/50">
              <span><span className="text-amber-400 mr-1">■</span>Hotel</span>
              <span><span className="text-emerald-400 mr-1">■</span>Per Diem</span>
              <span>· Voos não atribuídos por cidade</span>
            </div>
          </div>
        )}
        {flights.length===0&&hotels.length===0&&(
          <div className="bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-slate-500 text-sm text-center">
            Nenhuma viagem ou hotel registado ainda na aba Logística.
          </div>
        )}

// ── SIMULADOR DE FASE ELIMINATÓRIA ───────────────────────────────────────────
const KNOCKOUT_STAGES = [
  {id:"r16", label:"Rodada de 32",       short:"32A", stage:"16th Finals",    color:"#8b5cf6", dates:{from:"2026-06-28",to:"2026-07-04"}},
  {id:"r8",  label:"Oitavas de Final",   short:"8A",  stage:"8th Finals",     color:"#f59e0b", dates:{from:"2026-07-04",to:"2026-07-07"}},
  {id:"qf",  label:"Quartas de Final",   short:"QF",  stage:"Quarter-finals", color:"#ef4444", dates:{from:"2026-07-09",to:"2026-07-11"}},
  {id:"sf",  label:"Semifinais",         short:"SF",  stage:"Semi-finals",    color:"#ec4899", dates:{from:"2026-07-14",to:"2026-07-15"}},
  {id:"f",   label:"Final",              short:"F",   stage:"Final",          color:"#22c55e", dates:{from:"2026-07-18",to:"2026-07-19"}},
];

// IDs que entram na sinergia Portugal-Brasil (÷2)
const SIM_SINERGIA_NAMES  = ["quaresma","rui pedro","rodrigo alves","rodrigo"];
const SIM_SINERGIA_PITCH  = ["touchline_partial","touchline_knockout","centre_circle"];

const BLANK_SIM = () => ({
  id: Date.now().toString(36),
  name: "Novo Cenário",
  stages: Object.fromEntries(KNOCKOUT_STAGES.map(s => [s.id, {
    active:       false,
    games:        1,
    persons:      3,
    flightCostPP: 400,  // € por pessoa (ida+volta)
    hotelNights:  3,
    hotelCostPN:  150,  // € por noite (total quarto, não por pessoa)
    pitchIds:     [],
  }])),
});

function Simulador({ team, logistics, pitchData, usdEurRate, simulador, setSimulador, phase1Bruto=0, phase1Sin=0 }) {
  const USD_EUR_RATE = usdEurRate || 0.92;
  const fmtEUR = n => "€" + Math.round(n).toLocaleString("pt-PT");

  // Use external state if available, otherwise local fallback
  const hasExternal = !!setSimulador;
  const [localScenarios, setLocalScenarios] = useState([BLANK_SIM()]);
  const scenarios    = hasExternal && simulador?.length > 0 ? simulador : localScenarios;
  const setScenarios = hasExternal
    ? (updater) => {
        const next = typeof updater === "function" ? updater(scenarios) : updater;
        setSimulador(next);
        setLocalScenarios(next); // keep local in sync
      }
    : setLocalScenarios;

  const [saveIndicator, setSaveIndicator] = useState(null); // "saving" | "saved" | null
  const [activeScen,    setActiveScen]    = useState(0);
  const [expandedStage, setExpandedStage] = useState(null);

  // Show save indicator when simulador changes
  const prevSimStr = useRef(null);
  useEffect(() => {
    if (!hasExternal) return;
    const str = JSON.stringify(simulador);
    if (prevSimStr.current !== null && prevSimStr.current !== str) {
      setSaveIndicator("saved");
      const t = setTimeout(() => setSaveIndicator(null), 2000);
      return () => clearTimeout(t);
    }
    prevSimStr.current = str;
  }, [simulador]);

  const scen = scenarios[Math.min(activeScen, scenarios.length-1)] || scenarios[0];

  function updateScen(patch)          { setScenarios(prev => prev.map((s,i) => i===activeScen ? {...s,...patch} : s)); }
  function updateStage(sid, patch)    { updateScen({stages:{...scen.stages,[sid]:{...scen.stages[sid],...patch}}}); }
  function addScenario()              { const ns=BLANK_SIM(); ns.name=`Cenário ${scenarios.length+1}`; setScenarios(p=>[...p,ns]); setActiveScen(scenarios.length); }
  function deleteScenario(i)          { if(scenarios.length===1)return; setScenarios(p=>p.filter((_,idx)=>idx!==i)); setActiveScen(Math.max(0,activeScen-(i<=activeScen?1:0))); }
  function duplicateScenario()        { const d=JSON.parse(JSON.stringify(scen)); d.id=Date.now().toString(36); d.name=scen.name+" (cópia)"; setScenarios(p=>[...p,d]); setActiveScen(scenarios.length); }

  // Número de pessoas de sinergia na equipa
  const sinergiaTeam  = team.filter(p => SIM_SINERGIA_NAMES.some(n => p.name.toLowerCase().includes(n)));
  const sinergiaCount = sinergiaTeam.length;

  // ── Calcula custos de uma fase ──────────────────────────────────────────────
  function stageCalc(st) {
    const cfg = scen.stages[st.id];
    if (!cfg?.active) return {flight:0,hotel:0,perDiem:0,pitch:0,sinFlight:0,sinHotel:0,sinPerDiem:0,sinPitch:0,total:0,sin:0,net:0};

    const n    = cfg.persons;
    const sinN = Math.min(sinergiaCount, n);
    const g    = cfg.games;

    // Custos brutos
    const flight  = cfg.flightCostPP * n;
    const hotel   = cfg.hotelCostPN  * cfg.hotelNights * g;
    const perDiem = n * cfg.hotelNights * g * PER_DIEM_DAILY;

    // Pitch: custo total = (soma das posições) × jogos × câmbio
    const pitchUSD = cfg.pitchIds.reduce((s,id) => {
      const pos = PITCH_POSITIONS_CATALOG.find(p=>p.id===id);
      return s + (pos?.price||0);
    }, 0) * g;
    const pitch = pitchUSD * USD_EUR_RATE;

    // Sinergia — voo: custo por pessoa × nº pessoas sinergia ÷2
    const sinFlight  = sinN > 0 ? (cfg.flightCostPP * sinN) / 2 : 0;

    // Sinergia — hotel: proporcional às pessoas de sinergia ÷2
    const sinHotel   = sinN > 0 && n > 0
      ? (cfg.hotelCostPN * cfg.hotelNights * g * sinN / n) / 2
      : 0;

    // Sinergia — per diem: pessoas sinergia × noites ÷2
    const sinPerDiem = sinN > 0 ? (sinN * cfg.hotelNights * g * PER_DIEM_DAILY) / 2 : 0;

    // Sinergia — pitch: Presentation Position + Centre Circle ÷2
    // (independente de Portugal, é a regra da sinergia no simulador)
    const sinPitchUSD = cfg.pitchIds
      .filter(id => SIM_SINERGIA_PITCH.includes(id))
      .reduce((s,id) => { const pos=PITCH_POSITIONS_CATALOG.find(p=>p.id===id); return s+(pos?.price||0); }, 0) * g;
    const sinPitch = sinPitchUSD * USD_EUR_RATE / 2;

    const total = flight + hotel + perDiem + pitch;
    const sin   = sinFlight + sinHotel + sinPerDiem + sinPitch;
    const net   = total - sin;

    return {flight, hotel, perDiem, pitch, pitchUSD, sinFlight, sinHotel, sinPerDiem, sinPitch, sinPitchUSD, total, sin, net};
  }

  const allCalcs   = Object.fromEntries(KNOCKOUT_STAGES.map(st => [st.id, stageCalc(st)]));
  const grandTotal = KNOCKOUT_STAGES.reduce((s,st) => s + allCalcs[st.id].total, 0);
  const totalSin   = KNOCKOUT_STAGES.reduce((s,st) => s + allCalcs[st.id].sin,   0);
  const netTotal   = grandTotal - totalSin;

  // Pitch positions com preço (para selector)
  const pitchByCategory = {};
  PITCH_POSITIONS_CATALOG.filter(p=>p.price>0).forEach(p=>{
    if(!pitchByCategory[p.cat]) pitchByCategory[p.cat]=[];
    pitchByCategory[p.cat].push(p);
  });

  // Preencher com médias reais da logística
  function seedFromReal() {
    const realFlights = logistics?.flights||[];
    const realHotels  = logistics?.hotels||[];
    const avgFPP = realFlights.length
      ? realFlights.reduce((s,f)=>{
          const ppp=f.pricePerPerson>0?f.pricePerPerson:(f.price||0)/Math.max(1,(f.personIds||[]).length);
          return s+ppp;
        },0)/realFlights.length
      : 400;
    const avgHPN = realHotels.length
      ? realHotels.reduce((s,h)=>s+(h.price||0)/Math.max(1,logNights(h.checkIn,h.checkOut)||1),0)/realHotels.length
      : 150;
    const newStages = {};
    KNOCKOUT_STAGES.forEach(st=>{
      newStages[st.id]={...scen.stages[st.id], flightCostPP:Math.round(avgFPP), hotelCostPN:Math.round(avgHPN)};
    });
    updateScen({stages:newStages});
  }

  return (
    <div className="space-y-4 pb-6">

      {/* Header */}
      <div className="flex items-center gap-3 bg-violet-500/10 border border-violet-500/20 rounded-2xl px-4 py-3">
        <span className="text-2xl">🔮</span>
        <div className="flex-1 min-w-0">
          <div className="font-bold text-violet-300 text-base">Simulador — Fase Eliminatória</div>
          <div className="flex items-center gap-2 mt-0.5">
            <span className="text-xs text-violet-400/70">Estimativas isoladas · Não afeta dados reais</span>
            {saveIndicator==="saved" && (
              <span className="text-xs text-emerald-400 font-medium animate-pulse">✓ Guardado</span>
            )}
            {!hasExternal && (
              <span className="text-xs text-amber-500/70">⚠ Sem Firebase — só local</span>
            )}
          </div>
        </div>
        <button onClick={seedFromReal}
          className="text-xs px-3 py-1.5 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-slate-300 rounded-xl transition-colors shrink-0">
          📥 Usar médias reais
        </button>
      </div>

      {/* Scenario selector */}
      <div className="flex gap-1.5 overflow-x-auto no-scrollbar">
        {scenarios.map((s,i)=>(
          <button key={s.id} onClick={()=>setActiveScen(i)}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl border text-xs font-medium whitespace-nowrap transition-all shrink-0 ${
              i===activeScen?"bg-violet-600 border-violet-500 text-white":"bg-slate-800 border-slate-700 text-slate-400 hover:text-slate-200"}`}>
            {s.name}
            {scenarios.length>1&&(
              <span onClick={e=>{e.stopPropagation();deleteScenario(i);}}
                className="text-slate-500 hover:text-red-400 ml-1 transition-colors">✕</span>
            )}
          </button>
        ))}
        <button onClick={addScenario}
          className="px-3 py-1.5 rounded-xl border border-dashed border-slate-600 text-slate-500 hover:text-slate-300 text-xs whitespace-nowrap shrink-0 transition-colors">
          + Cenário
        </button>
      </div>

      {/* Scenario name + duplicate */}
      <div className="flex gap-2">
        <input value={scen.name} onChange={e=>updateScen({name:e.target.value})}
          className="flex-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-200 outline-none focus:border-violet-500"/>
        <button onClick={duplicateScenario}
          className="px-3 py-2 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-slate-300 rounded-xl text-xs transition-colors shrink-0">
          📋 Duplicar
        </button>
      </div>

      {/* Sinergia notice */}
      {sinergiaCount > 0 && (
        <div className="px-3 py-2 bg-emerald-950/30 border border-emerald-700/30 rounded-xl text-xs text-emerald-400/80 space-y-0.5">
          <div className="font-semibold text-emerald-400">💚 Sinergia Brasil automática para {sinergiaCount} pessoa{sinergiaCount!==1?"s":""}: {sinergiaTeam.map(p=>p.name.split(" ")[0]).join(", ")}</div>
          <div className="text-emerald-600">✈️ Aéreo · 🏨 Hotel · 🍽️ Per diem · 🎙️ Presentation Position + Centre Circle — todos ÷2</div>
        </div>
      )}

      {/* Stage cards */}
      <div className="space-y-2">
        {KNOCKOUT_STAGES.map(st=>{
          const cfg  = scen.stages[st.id];
          const calc = allCalcs[st.id];
          const isExp = expandedStage===st.id;
          const stageMatches = FIFA_MATCHES.filter(m=>m.stage===st.stage);

          return (
            <div key={st.id} className={`rounded-2xl border overflow-hidden transition-all ${cfg.active?"border-slate-600":"border-slate-700/40 opacity-60"}`}
              style={cfg.active?{borderColor:st.color+"55"}:{}}>

              {/* Header */}
              <div className="flex items-center gap-3 px-4 py-3" style={{background:cfg.active?st.color+"11":"transparent"}}>
                <button onClick={()=>updateStage(st.id,{active:!cfg.active})}
                  className={`relative inline-flex h-5 w-9 shrink-0 rounded-full transition-colors`}
                  style={{background:cfg.active?st.color:"#334155"}}>
                  <span className={`inline-block h-4 w-4 rounded-full bg-white shadow mt-0.5 transition-transform ${cfg.active?"translate-x-4":"translate-x-0.5"}`}/>
                </button>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm font-semibold text-slate-200">{st.label}</span>
                    <span className="text-xs text-slate-500">{st.dates.from} → {st.dates.to}</span>
                    <span className="text-xs px-1.5 py-0.5 rounded" style={{background:st.color+"22",color:st.color}}>
                      {stageMatches.length} jogos
                    </span>
                  </div>
                </div>
                {cfg.active && calc.total>0 && (
                  <div className="text-right shrink-0">
                    <div className="text-sm font-bold text-white">{fmtEUR(calc.total)}</div>
                    {calc.sin>0 && <div className="text-xs text-emerald-400">-{fmtEUR(calc.sin)} sin.</div>}
                    {calc.sin>0 && <div className="text-xs text-emerald-300 font-semibold">{fmtEUR(calc.net)}</div>}
                  </div>
                )}
                {cfg.active && (
                  <button onClick={()=>setExpandedStage(isExp?null:st.id)}
                    className="text-slate-400 hover:text-slate-200 text-sm transition-colors shrink-0 w-5 text-center">
                    {isExp?"▲":"▼"}
                  </button>
                )}
              </div>

              {/* Detail */}
              {cfg.active && isExp && (
                <div className="px-4 pb-4 pt-2 border-t space-y-4" style={{borderColor:st.color+"33"}}>

                  {/* Games + persons */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-slate-400 mb-1 block">⚽ Jogos a cobrir</label>
                      <div className="flex items-center gap-2">
                        <input type="number" min="1" max={stageMatches.length} value={cfg.games}
                          onChange={e=>updateStage(st.id,{games:Math.max(1,parseInt(e.target.value)||1)})}
                          className="w-20 px-2 py-1.5 bg-slate-700 border border-slate-600 rounded-xl text-sm text-slate-200 outline-none text-center"/>
                        <span className="text-xs text-slate-500">de {stageMatches.length}</span>
                      </div>
                    </div>
                    <div>
                      <label className="text-xs text-slate-400 mb-1 block">👥 Pessoas em campo</label>
                      <div className="flex items-center gap-2">
                        <input type="number" min="1" max={Math.max(1,team.length)} value={cfg.persons}
                          onChange={e=>updateStage(st.id,{persons:Math.max(1,parseInt(e.target.value)||1)})}
                          className="w-20 px-2 py-1.5 bg-slate-700 border border-slate-600 rounded-xl text-sm text-slate-200 outline-none text-center"/>
                        <span className="text-xs text-slate-500">de {team.length}</span>
                      </div>
                    </div>
                  </div>

                  {/* ✈️ Aéreo */}
                  <div className="bg-blue-950/20 border border-blue-800/30 rounded-xl p-3 space-y-2">
                    <div className="text-xs font-semibold text-blue-400 uppercase tracking-wider">✈️ Aéreo</div>
                    <div className="flex items-end gap-3 flex-wrap">
                      <div className="flex-1 min-w-[130px]">
                        <label className="text-xs text-slate-400 mb-1 block">Custo por pessoa (ida+volta)</label>
                        <div className="flex items-center gap-1.5">
                          <span className="text-xs text-slate-500">€</span>
                          <input type="number" min="0" step="50" value={cfg.flightCostPP}
                            onChange={e=>updateStage(st.id,{flightCostPP:parseInt(e.target.value)||0})}
                            className="w-full px-2 py-1.5 bg-slate-700 border border-slate-600 rounded-xl text-sm text-slate-200 outline-none"/>
                        </div>
                      </div>
                      <div className="text-right shrink-0 pb-0.5">
                        <div className="text-xs text-slate-500">{cfg.persons} pax × €{cfg.flightCostPP}</div>
                        <div className="text-sm font-bold text-blue-400">{fmtEUR(calc.flight)}</div>
                        {calc.sinFlight>0 && <div className="text-xs text-emerald-400">-{fmtEUR(calc.sinFlight)} sin.</div>}
                      </div>
                    </div>
                  </div>

                  {/* 🏨 Hospedagem + per diem */}
                  <div className="bg-amber-950/20 border border-amber-800/30 rounded-xl p-3 space-y-3">
                    <div className="text-xs font-semibold text-amber-400 uppercase tracking-wider">🏨 Hospedagem</div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="text-xs text-slate-400 mb-1 block">€/noite (quarto)</label>
                        <div className="flex items-center gap-1">
                          <span className="text-xs text-slate-500">€</span>
                          <input type="number" min="0" step="25" value={cfg.hotelCostPN}
                            onChange={e=>updateStage(st.id,{hotelCostPN:parseInt(e.target.value)||0})}
                            className="w-full px-2 py-1.5 bg-slate-700 border border-slate-600 rounded-xl text-sm text-slate-200 outline-none"/>
                        </div>
                      </div>
                      <div>
                        <label className="text-xs text-slate-400 mb-1 block">Noites por jogo</label>
                        <input type="number" min="1" max="7" value={cfg.hotelNights}
                          onChange={e=>updateStage(st.id,{hotelNights:Math.max(1,parseInt(e.target.value)||1)})}
                          className="w-full px-2 py-1.5 bg-slate-700 border border-slate-600 rounded-xl text-sm text-slate-200 outline-none text-center"/>
                      </div>
                    </div>
                    <div className="space-y-1.5 text-xs border-t border-amber-800/20 pt-2">
                      <div className="flex justify-between items-center">
                        <span className="text-slate-500">Hospedagem ({cfg.games}j × {cfg.hotelNights}n × €{cfg.hotelCostPN})</span>
                        <div className="text-right">
                          <span className="font-bold text-amber-400">{fmtEUR(calc.hotel)}</span>
                          {calc.sinHotel>0 && <div className="text-emerald-400">-{fmtEUR(calc.sinHotel)} sin.</div>}
                        </div>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-slate-500">🍽️ Per diem ({cfg.persons}p × {cfg.games * cfg.hotelNights}n × €{PER_DIEM_DAILY})</span>
                        <div className="text-right">
                          <span className="font-bold text-emerald-400">{fmtEUR(calc.perDiem)}</span>
                          {calc.sinPerDiem>0 && <div className="text-emerald-500">-{fmtEUR(calc.sinPerDiem)} sin.</div>}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 🎙️ Pitch positions */}
                  <div className="bg-violet-950/20 border border-violet-800/30 rounded-xl p-3 space-y-2">
                    <div className="flex items-center justify-between">
                      <div className="text-xs font-semibold text-violet-400 uppercase tracking-wider">🎙️ Pitch Positions <span className="text-violet-600 normal-case">(por jogo)</span></div>
                      {calc.sinPitch>0 && <div className="text-xs text-emerald-400">-{fmtEUR(calc.sinPitch)} sin.</div>}
                    </div>
                    <div className="space-y-2">
                      {Object.entries(pitchByCategory).map(([cat, positions])=>{
                        const catMeta = PITCH_CAT_META[cat]||{label:cat,color:"#94a3b8"};
                        return (
                          <div key={cat}>
                            <div className="text-xs font-medium mb-1" style={{color:catMeta.color}}>{catMeta.label}</div>
                            <div className="flex flex-wrap gap-1.5">
                              {positions.map(pos=>{
                                const sel  = cfg.pitchIds.includes(pos.id);
                                const isSin = SIM_SINERGIA_PITCH.includes(pos.id);
                                return (
                                  <button key={pos.id} type="button"
                                    onClick={()=>updateStage(st.id,{pitchIds:sel
                                      ?cfg.pitchIds.filter(id=>id!==pos.id)
                                      :[...cfg.pitchIds,pos.id]})}
                                    className="flex items-center gap-1 px-2 py-1 rounded-lg border text-xs transition-all"
                                    style={sel
                                      ?{background:catMeta.color+"33",borderColor:catMeta.color+"66",color:catMeta.color}
                                      :{background:"transparent",borderColor:"#475569",color:"#94a3b8"}}>
                                    {pos.emoji} {pos.label.split("–")[0].trim()}
                                    {pos.price>0 && <span className="opacity-50">${pos.price}</span>}
                                    {isSin && <span className={sel?"text-emerald-400 font-bold opacity-80":"opacity-40"} title="Entra na sinergia ÷2">÷2</span>}
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {calc.pitch>0 && (
                      <div className="flex justify-between text-xs pt-1 border-t border-violet-800/20">
                        <span className="text-slate-500">{cfg.pitchIds.length} pos. × {cfg.games} jogo{cfg.games!==1?"s":""} · ${calc.pitchUSD} USD</span>
                        <div className="text-right">
                          <span className="font-bold text-violet-400">{fmtEUR(calc.pitch)}</span>
                          {calc.sinPitch>0 && (
                            <div className="text-emerald-400 text-xs">-{fmtEUR(calc.sinPitch)} sin. <span className="text-emerald-600">(Pres.Pos+Centre Circle÷2)</span></div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Stage total */}
                  <div className="flex justify-between items-center border-t border-slate-700/40 pt-3">
                    <span className="text-xs text-slate-400 font-medium">Total desta fase</span>
                    <div className="text-right">
                      <div className="text-base font-bold text-white">{fmtEUR(calc.total)}</div>
                      {calc.sin>0 && <>
                        <div className="text-xs text-emerald-400">-{fmtEUR(calc.sin)} sinergia</div>
                        <div className="text-sm font-bold text-emerald-300">→ {fmtEUR(calc.net)} líquido</div>
                      </>}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Grand total */}
      {grandTotal > 0 && (
        <div className="rounded-2xl border border-violet-500/30 bg-violet-950/20 p-4 space-y-3">
          <div className="text-xs font-semibold text-violet-400 uppercase tracking-wider">📊 Total — {scen.name}</div>

          {/* Per stage */}
          <div className="space-y-1.5">
            {KNOCKOUT_STAGES.filter(st=>allCalcs[st.id].total>0).map(st=>{
              const c=allCalcs[st.id];
              return (
                <div key={st.id} className="grid text-xs" style={{gridTemplateColumns:"1rem 1fr auto auto auto"}}>
                  <span className="w-2 h-2 rounded-full mt-1 shrink-0" style={{background:st.color}}/>
                  <span className="text-slate-300 pl-1">{st.label}</span>
                  <span className="text-slate-400 px-2">{fmtEUR(c.total)}</span>
                  {c.sin>0 && <span className="text-emerald-400 px-1">-{fmtEUR(c.sin)}</span>}
                  <span className="text-emerald-300 font-bold text-right">{fmtEUR(c.net)}</span>
                </div>
              );
            })}
          </div>

          {/* Category totals */}
          <div className="border-t border-violet-700/30 pt-3 grid grid-cols-2 gap-x-4 gap-y-1">
            {[
              {l:"✈️ Aéreo",      v:KNOCKOUT_STAGES.reduce((s,st)=>s+allCalcs[st.id].flight,  0), c:"#3b82f6"},
              {l:"🏨 Hospedagem", v:KNOCKOUT_STAGES.reduce((s,st)=>s+allCalcs[st.id].hotel,   0), c:"#f59e0b"},
              {l:"🍽️ Per diem",   v:KNOCKOUT_STAGES.reduce((s,st)=>s+allCalcs[st.id].perDiem, 0), c:"#10b981"},
              {l:"🎙️ Pitch",      v:KNOCKOUT_STAGES.reduce((s,st)=>s+allCalcs[st.id].pitch,   0), c:"#a78bfa"},
            ].filter(x=>x.v>0).map(x=>(
              <div key={x.l} className="flex justify-between text-xs">
                <span className="text-slate-400">{x.l}</span>
                <span style={{color:x.c}} className="font-medium">{fmtEUR(x.v)}</span>
              </div>
            ))}
          </div>

          {/* Bottom line */}
          <div className="border-t border-violet-700/40 pt-3 space-y-1.5">
            <div className="flex justify-between items-center">
              <span className="text-slate-300">Custo bruto total</span>
              <span className="text-white font-bold text-lg">{fmtEUR(grandTotal)}</span>
            </div>
            {totalSin>0 && <>
              <div className="flex justify-between items-center text-sm">
                <span className="text-emerald-400">💚 Sinergia Brasil</span>
                <span className="text-emerald-400 font-semibold">-{fmtEUR(totalSin)}</span>
              </div>
              <div className="flex justify-between items-center text-base border-t border-violet-700/30 pt-2">
                <span className="text-emerald-300 font-bold">Custo líquido estimado</span>
                <span className="text-emerald-300 font-bold text-xl">{fmtEUR(netTotal)}</span>
              </div>
            </>}
          </div>

          {/* Multi-scenario compare */}
          {scenarios.length>1 && (
            <div className="border-t border-violet-700/30 pt-3">
              <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">📐 Comparar cenários</div>
              <div className="space-y-1">
                {scenarios.map((s,i)=>{
                  const tot=KNOCKOUT_STAGES.reduce((sum,st)=>{
                    const cfg=s.stages[st.id]; if(!cfg?.active) return sum;
                    const n=cfg.persons, sinN=Math.min(sinergiaCount,n), g=cfg.games;
                    const fl=cfg.flightCostPP*n, ho=cfg.hotelCostPN*cfg.hotelNights*g, pd=n*cfg.hotelNights*g*PER_DIEM_DAILY;
                    const pi=(cfg.pitchIds||[]).reduce((ps,id)=>{const pos=PITCH_POSITIONS_CATALOG.find(p=>p.id===id);return ps+(pos?.price||0);},0)*g*USD_EUR_RATE;
                    const sinFl=sinN>0?(cfg.flightCostPP*sinN)/2:0;
                    const sinHo=sinN>0&&n>0?(cfg.hotelCostPN*cfg.hotelNights*g*sinN/n)/2:0;
                    const sinPd=sinN>0?(sinN*cfg.hotelNights*g*PER_DIEM_DAILY)/2:0;
                    const sinPi=(cfg.pitchIds||[]).filter(id=>SIM_SINERGIA_PITCH.includes(id)).reduce((ps,id)=>{const pos=PITCH_POSITIONS_CATALOG.find(p=>p.id===id);return ps+(pos?.price||0);},0)*g*USD_EUR_RATE/2;
                    return sum+fl+ho+pd+pi-sinFl-sinHo-sinPd-sinPi;
                  },0);
                  return (
                    <div key={s.id} className={`flex justify-between text-xs px-2 py-1.5 rounded-lg ${i===activeScen?"bg-violet-800/30 text-violet-200":"text-slate-400"}`}>
                      <span>{s.name}</span>
                      <span className="font-semibold">{fmtEUR(tot)}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── TOTAL MUNDIAL COMPLETO ── */}
      {phase1Bruto > 0 && grandTotal > 0 && (
        <div className="rounded-2xl border border-amber-500/40 bg-gradient-to-br from-amber-950/30 to-slate-900 p-4 space-y-3">
          <div className="flex items-center gap-2">
            <span className="text-xl">🏆</span>
            <div>
              <div className="text-sm font-bold text-amber-300">Total Mundial 2026 — Cobertura Completa</div>

            </div>
          </div>

          {/* Two columns: phase 1 + knockout */}
          <div className="grid grid-cols-2 gap-3 text-xs">
            <div className="bg-slate-800/60 rounded-xl p-3 space-y-1">
              <div className="font-semibold text-slate-400 uppercase tracking-wider text-xs mb-2">Fase de Grupos</div>
              <div className="flex justify-between">
                <span className="text-slate-400">Custo bruto</span>
                <span className="text-slate-200 font-medium">{fmtEUR(phase1Bruto)}</span>
              </div>
              {phase1Sin>0 && (
                <div className="flex justify-between">
                  <span className="text-emerald-500">💚 Sinergia</span>
                  <span className="text-emerald-400 font-medium">-{fmtEUR(phase1Sin)}</span>
                </div>
              )}
              <div className="flex justify-between border-t border-slate-700/40 pt-1 mt-1">
                <span className="text-slate-300 font-semibold">Líquido</span>
                <span className="text-emerald-300 font-bold">{fmtEUR(phase1Bruto - phase1Sin)}</span>
              </div>
            </div>
            <div className="bg-violet-900/20 rounded-xl p-3 space-y-1">
              <div className="font-semibold text-violet-400 uppercase tracking-wider text-xs mb-2">Eliminatória</div>
              <div className="flex justify-between">
                <span className="text-slate-400">Custo bruto</span>
                <span className="text-slate-200 font-medium">{fmtEUR(grandTotal)}</span>
              </div>
              {totalSin>0 && (
                <div className="flex justify-between">
                  <span className="text-emerald-500">💚 Sinergia</span>
                  <span className="text-emerald-400 font-medium">-{fmtEUR(totalSin)}</span>
                </div>
              )}
              <div className="flex justify-between border-t border-violet-700/30 pt-1 mt-1">
                <span className="text-slate-300 font-semibold">Líquido</span>
                <span className="text-emerald-300 font-bold">{fmtEUR(netTotal)}</span>
              </div>
            </div>
          </div>

          {/* Grand combined total */}
          <div className="border-t border-amber-600/30 pt-3 space-y-2">
            <div className="flex justify-between items-center text-sm">
              <span className="text-slate-300">Total bruto Mundial</span>
              <span className="text-white font-bold text-base">{fmtEUR(phase1Bruto + grandTotal)}</span>
            </div>
            {(phase1Sin + totalSin) > 0 && (
              <div className="flex justify-between items-center text-sm">
                <span className="text-emerald-400">💚 Total Sinergia Brasil</span>
                <span className="text-emerald-400 font-semibold">-{fmtEUR(phase1Sin + totalSin)}</span>
              </div>
            )}
            <div className="flex justify-between items-center border-t border-amber-600/40 pt-2.5 mt-1">
              <div>
                <div className="text-amber-300 font-bold text-base">🏆 Custo líquido total</div>
                <div className="text-xs text-amber-400/60">Cobertura completa do Mundial</div>
              </div>
              <span className="text-amber-300 font-bold text-2xl">{fmtEUR((phase1Bruto - phase1Sin) + netTotal)}</span>
            </div>
          </div>
        </div>
      )}

      {phase1Bruto > 0 && grandTotal === 0 && (
        <div className="rounded-2xl border border-slate-700/40 bg-slate-800/30 px-4 py-3 text-center">
          <div className="text-xs text-slate-500">Ativa pelo menos uma fase acima para ver o total do Mundial</div>
        </div>
      )}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
const TAB_GROUPS = [
  {
    id: "geral",
    tabs: [
      {id:"home", label:"Início", emoji:"🏠"},
    ]
  },
  {
    id: "conteudo",
    label: "Conteúdo",
    tabs: [
      {id:"agenda",   label:"Pauta",      emoji:"📋"},
      {id:"schedule", label:"Calendário", emoji:"📅"},
    ]
  },
  {
    id: "financeiro",
    label: "Financeiro",
    tabs: [
      {id:"financeiro", label:"Financeiro", emoji:"💰", adminOnly:true},
      {id:"logistics",  label:"Logística",  emoji:"🧳"},
    ]
  },
  {
    id: "operacao",
    label: "Operação",
    tabs: [
      {id:"pitch", label:"Pitch",   emoji:"🎙️"},
      {id:"team",  label:"Equipas", emoji:"👥"},
    ]
  },
];

// Flat list for backward compat
const TABS = TAB_GROUPS.flatMap(g => g.tabs);

function App() {
  const [team,          setTeam]          = useState([]);
  const [agenda,        setAgenda]        = useState([]);
  const [pitchData,     setPitchData]     = useState({});
  const [logistics,     setLogistics]     = useState({flights:[], hotels:[]});
  const [broadcastData, setBroadcastData] = useState({});
  const [simulador,     setSimulador]     = useState([]);   // array of scenario objects
  const [tab,           setTab]           = useState("home");
  const [userRole,      setUserRole]      = useState(null);
  const [isAdmin,       setIsAdmin]       = useState(false);
  const [showChangePw,  setShowChangePw]  = useState(false);
  const [dbLoading,     setDbLoading]     = useState(true);
  const [dbError,       setDbError]       = useState(null);

  // Derived values
  const isLoggedIn   = userRole !== null;
  const isFinanceiro = userRole === "financeiro";
  const isTransmite  = userRole === "transmite";
  const isComercial  = userRole === "comercial";
  const isRedes      = userRole === "redes";

  // Track last data synced from Firestore to avoid echo-writes
  const lastSynced  = useRef({ team:null, agenda:null, pitch:null, logistics:null, broadcast:null, simulador:null });
  const writeTimers = useRef({});

  // ── Firestore real-time listeners ──────────────────────────────────────────
  useEffect(() => {
    let loaded = 0;
    const markLoaded = () => { if (++loaded >= 6) setDbLoading(false); };
    const col = db.collection("mundial2026");
    const onErr = e => { console.error(e); setDbError(e.message); };

    const unsubs = [
      col.doc("team").onSnapshot(snap => {
        const val = snap.exists ? (snap.data().value || []) : [];
        lastSynced.current.team = JSON.stringify(val);
        setTeam(val); markLoaded();
      }, onErr),
      col.doc("agenda").onSnapshot(snap => {
        const val = snap.exists ? (snap.data().value || []) : [];
        lastSynced.current.agenda = JSON.stringify(val);
        setAgenda(val); markLoaded();
      }, onErr),
      col.doc("pitch").onSnapshot(snap => {
        const val = snap.exists ? (snap.data().value || {}) : {};
        lastSynced.current.pitch = JSON.stringify(val);
        setPitchData(val); markLoaded();
      }, onErr),
      col.doc("logistics").onSnapshot(snap => {
        const val = snap.exists ? (snap.data().value || {flights:[],hotels:[]}) : {flights:[],hotels:[]};
        lastSynced.current.logistics = JSON.stringify(val);
        setLogistics(val); markLoaded();
      }, onErr),
      col.doc("broadcast").onSnapshot(snap => {
        const val = snap.exists ? (snap.data().value || {}) : {};
        lastSynced.current.broadcast = JSON.stringify(val);
        setBroadcastData(val); markLoaded();
      }, onErr),
      col.doc("simulador").onSnapshot(snap => {
        const val = snap.exists ? (snap.data().value || []) : [];
        lastSynced.current.simulador = JSON.stringify(val);
        setSimulador(val); markLoaded();
      }, onErr),
    ];
    return () => unsubs.forEach(u => u());
  }, []);

  // ── Debounced Firestore writes (skip echo, 700ms delay) ───────────────────
  function fsWrite(docId, syncKey, data) {
    const str = JSON.stringify(data);
    if (str === lastSynced.current[syncKey]) return;
    if (writeTimers.current[docId]) clearTimeout(writeTimers.current[docId]);
    writeTimers.current[docId] = setTimeout(() => {
      lastSynced.current[syncKey] = str;
      db.collection("mundial2026").doc(docId).set({ value: data }).catch(console.error);
    }, 700);
  }

  useEffect(() => { if (!dbLoading) fsWrite("team",      "team",      team);          }, [team,          dbLoading]);
  useEffect(() => { if (!dbLoading) fsWrite("agenda",    "agenda",    agenda);        }, [agenda,        dbLoading]);
  useEffect(() => { if (!dbLoading) fsWrite("pitch",     "pitch",     pitchData);     }, [pitchData,     dbLoading]);
  useEffect(() => { if (!dbLoading) fsWrite("logistics", "logistics", logistics);     }, [logistics,     dbLoading]);
  useEffect(() => { if (!dbLoading) fsWrite("broadcast", "broadcast", broadcastData); }, [broadcastData, dbLoading]);
  useEffect(() => { if (!dbLoading) fsWrite("simulador", "simulador", simulador);     }, [simulador,     dbLoading]);

  function handleLockClick() {
    setUserRole(null); setIsAdmin(false); // returns to login screen
  }

  // ── Loading / error screens ────────────────────────────────────────────────
  if (dbError) return (
    <div className="min-h-screen bg-slate-900 flex items-center justify-center px-6">
      <div className="text-center max-w-sm">
        <div className="text-4xl mb-4">⚠️</div>
        <div className="text-red-400 font-semibold mb-2">Erro ao conectar à base de dados</div>
        <div className="text-slate-500 text-sm mb-4">{dbError}</div>
        <button onClick={()=>window.location.reload()}
          className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-xl text-sm">
          Tentar novamente
        </button>
      </div>
    </div>
  );

  // Login vem SEMPRE primeiro — não bloquear com loading antes de autenticar
  if (!userRole) return (
    <LoginScreen onSuccess={(role)=>{ setUserRole(role); setIsAdmin(role==="admin"); }}/>
  );

  // Só mostra loading depois de logado, enquanto Firebase carrega dados
  if (dbLoading) return (
    <div className="min-h-screen bg-slate-900 flex items-center justify-center">
      <div className="text-center">
        <div className="text-5xl mb-5">🏆</div>
        <div className="text-slate-200 font-semibold text-lg mb-1">Mundial 2026</div>
        <div className="text-slate-400 text-sm mb-6">LiveMode · A carregar dados...</div>
        <div className="flex justify-center gap-1.5">
          {[0,1,2].map(i=>(
            <div key={i} className="w-2 h-2 bg-emerald-500 rounded-full animate-bounce"
              style={{animationDelay:`${i*150}ms`}}/>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-900 text-slate-100">
      {/* Modals */}
      {showChangePw && <ChangePwModal onClose={()=>setShowChangePw(false)} userRole={userRole}/>}

      {/* Header */}
      <div className="bg-slate-900/95 border-b border-slate-700/50 sticky top-0 z-20 backdrop-blur-sm no-print">
        <div className="max-w-3xl mx-auto px-4">
          <div className="py-3 flex items-center gap-3">
            <span className="text-3xl">🏆</span>
            <div>
              <div className="font-bold text-slate-100 leading-tight text-base">Mundial 2026</div>
              <div className="text-xs text-slate-400">Plano de Pauta & Logística · LiveMode</div>
            </div>
            <div className="ml-auto flex items-center gap-2">
              {/* Mode badge */}
              {userRole === "admin"
                ? <span className="text-xs text-amber-400 bg-amber-400/10 px-2.5 py-1 rounded-full border border-amber-400/20 font-medium">
                    ✏️ Admin
                  </span>
                : userRole === "financeiro"
                ? <span className="text-xs text-yellow-400 bg-yellow-400/10 px-2.5 py-1 rounded-full border border-yellow-400/20 font-medium">
                    💰 Financeiro
                  </span>
                : userRole === "transmite"
                ? <span className="text-xs text-purple-400 bg-purple-400/10 px-2.5 py-1 rounded-full border border-purple-400/20 font-medium">
                    📡 Transmissão
                  </span>
                : userRole === "comercial"
                ? <span className="text-xs text-green-400 bg-green-400/10 px-2.5 py-1 rounded-full border border-green-400/20 font-medium">
                    🤝 Comercial
                  </span>
                : userRole === "redes"
                ? <span className="text-xs text-pink-400 bg-pink-400/10 px-2.5 py-1 rounded-full border border-pink-400/20 font-medium">
                    📲 Redes
                  </span>
                : null
              }
              {/* Lock / unlock button */}
              <button
                onClick={handleLockClick}
                title="Sair / Trocar conta"
                className={`p-2 rounded-xl border transition-colors text-sm ${isAdmin?"bg-amber-500/20 border-amber-500/40 hover:bg-amber-500/30 text-amber-300":"bg-slate-700/50 border-slate-600 hover:bg-slate-700 text-slate-400"}`}>
                🔓
              </button>
              {/* Change password (admin only) */}
              {isAdmin&&(
                <button onClick={()=>setShowChangePw(true)}
                  title="Alterar senha"
                  className="p-2 rounded-xl border border-slate-600 bg-slate-700/50 hover:bg-slate-700 text-slate-400 text-sm transition-colors">
                  🔑
                </button>
              )}
            </div>
          </div>
          <div className="flex overflow-x-auto no-scrollbar -mb-px items-end">
            {TAB_GROUPS.map((group, gi) => {
              const visibleTabs = group.tabs.filter(t => !t.adminOnly || isAdmin || isFinanceiro);
              if (visibleTabs.length === 0) return null;
              return (
                <div key={group.id} className="flex items-end shrink-0">
                  {/* Group separator + label (not for first group) */}
                  {gi > 0 && (
                    <div className="flex flex-col items-center self-stretch justify-end pb-0 mx-0.5">
                      <div className="w-px h-5 bg-slate-700/60 mb-0"/>
                    </div>
                  )}
                  {/* Group tabs */}
                  <div className="flex flex-col">
                    {group.label && (
                      <div className="text-center px-2 pb-0.5">
                        <span className="text-[9px] font-semibold text-slate-600 uppercase tracking-widest whitespace-nowrap">
                          {group.label}
                        </span>
                      </div>
                    )}
                    <div className="flex">
                      {visibleTabs.map(t => (
                        <button key={t.id} onClick={()=>setTab(t.id)}
                          className={`flex items-center gap-1 px-2.5 py-2 text-xs font-medium border-b-2 whitespace-nowrap transition-colors ${
                            tab===t.id
                              ? "border-emerald-500 text-emerald-400"
                              : "border-transparent text-slate-400 hover:text-slate-200"
                          }`}>
                          <span>{t.emoji}</span>
                          <span className="hidden sm:inline">{t.label}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="max-w-3xl mx-auto px-4 py-5">
        {tab==="home"  && <Home  team={team} agenda={agenda} broadcastData={broadcastData} logistics={logistics}/>}
        {tab==="agenda"     && <Agenda     team={team} isAdmin={isAdmin} userRole={userRole} agenda={agenda} setAgenda={setAgenda} pitchData={pitchData} logistics={logistics} broadcastData={broadcastData}/>}
        {tab==="logistics"  && <Logistics  team={team} isAdmin={isAdmin} logistics={logistics} setLogistics={setLogistics}/>}
        {tab==="pitch"      && <PitchTab   team={team} isAdmin={isAdmin} userRole={userRole} pitchData={pitchData} setPitchData={setPitchData}/>}
        {tab==="financeiro" && (isAdmin||isFinanceiro) && <FinanceDashboard team={team} agenda={agenda} pitchData={pitchData} logistics={logistics} setLogistics={setLogistics} simulador={simulador} setSimulador={setSimulador}/>}
        {tab==="schedule"   && <Schedule   team={team} broadcastData={broadcastData} setBroadcastData={setBroadcastData} isAdmin={isAdmin}/>}
        {tab==="team"       && <TeamTab    team={team} setTeam={setTeam} isAdmin={isAdmin}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
