// ── WEEK VIEW ────────────────────────────────────────────────────────────────
function WeekView({ selectedDate, setSelectedDate, agenda, team, logistics, broadcastData, isAdmin }) {
  // Find the Monday of the week containing selectedDate
  function getWeekDates(anchor) {
    const d = new Date(anchor + "T12:00:00Z");
    const dow = d.getUTCDay(); // 0=Sun
    const monday = new Date(d);
    monday.setUTCDate(d.getUTCDate() - (dow === 0 ? 6 : dow - 1));
    return Array.from({length:7}, (_,i) => {
      const x = new Date(monday);
      x.setUTCDate(monday.getUTCDate() + i);
      return x.toISOString().slice(0,10);
    });
  }

  const [weekAnchor, setWeekAnchor] = useState(selectedDate);
  const weekDates = getWeekDates(weekAnchor);
  const DOW = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];

  function prevWeek() {
    const d = new Date(weekAnchor+"T12:00:00Z");
    d.setUTCDate(d.getUTCDate()-7);
    setWeekAnchor(d.toISOString().slice(0,10));
  }
  function nextWeek() {
    const d = new Date(weekAnchor+"T12:00:00Z");
    d.setUTCDate(d.getUTCDate()+7);
    setWeekAnchor(d.toISOString().slice(0,10));
  }

  const STATUS_COLORS = {confirmed:"#10b981", pending:"#f59e0b", cancelled:"#ef4444"};

  return (
    <div className="space-y-2">
      {/* Week nav */}
      <div className="flex items-center justify-between">
        <button onClick={prevWeek} className="p-1.5 rounded-lg bg-slate-800 border border-slate-700 text-slate-400 hover:text-slate-200 text-sm">◀</button>
        <span className="text-xs font-medium text-slate-300">
          {weekDates[0]} → {weekDates[6]}
        </span>
        <button onClick={nextWeek} className="p-1.5 rounded-lg bg-slate-800 border border-slate-700 text-slate-400 hover:text-slate-200 text-sm">▶</button>
      </div>

      {/* Grid: days as columns, people as rows */}
      <div className="overflow-x-auto no-scrollbar">
        <div style={{minWidth: "640px"}}>
          {/* Day headers */}
          <div className="grid gap-1 mb-1" style={{gridTemplateColumns:`80px repeat(7,1fr)`}}>
            <div/>
            {weekDates.map((d,i) => {
              const hasMatch = FIFA_MATCHES.some(m=>m.date===d);
              const hasBroadcast = FIFA_MATCHES.some(m=>m.date===d && broadcastData?.[m.id]?.enabled);
              const today = new Date().toISOString().slice(0,10);
              return (
                <button key={d} onClick={()=>setSelectedDate(d)}
                  className={`rounded-xl py-1.5 text-center transition-all ${d===today?"ring-1 ring-emerald-500":""}`}
                  style={{background: hasBroadcast?"#7f1d1d33" : hasMatch?"#78350f22":"#1e293b"}}>
                  <div className="text-xs font-semibold text-slate-300">{DOW[i]}</div>
                  <div className="text-xs text-slate-500">{d.slice(8)}/{d.slice(5,7)}</div>
                  {hasBroadcast && <div className="text-xs text-red-400 font-bold">📡</div>}
                  {hasMatch && !hasBroadcast && <div className="text-xs text-amber-400">⚽</div>}
                </button>
              );
            })}
          </div>

          {/* Person rows */}
          {team.map(person => (
            <div key={person.id} className="grid gap-1 mb-1" style={{gridTemplateColumns:`80px repeat(7,1fr)`}}>
              {/* Person label */}
              <div className="flex items-center gap-1.5 pr-1">
                <div className="w-2 h-2 rounded-full shrink-0" style={{background:person.color}}/>
                <span className="text-xs text-slate-300 truncate font-medium">{person.name.split(" ")[0]}</span>
              </div>
              {/* Day cells */}
              {weekDates.map(d => {
                const entries = agenda.filter(e => {
                  if (e.date !== d || e.personId === "__team__") return false;
                  const ids = e.personIds || (e.personId ? [e.personId] : []);
                  return ids.includes(person.id);
                });
                const hasHotel = (logistics?.hotels||[]).some(h =>
                  h.checkIn <= d && h.checkOut > d && (h.personIds||[]).includes(person.id));
                const hasFlight = (logistics?.flights||[]).some(f =>
                  f.date === d && (f.personIds||[]).includes(person.id));
                const hasConflict = entries.length > 1 && entries.filter(e=>e.time).length > 1;

                return (
                  <button key={d} onClick={()=>setSelectedDate(d)}
                    className={`rounded-lg p-1 min-h-[52px] border text-left transition-all hover:border-emerald-600/50 ${
                      hasConflict ? "border-red-500/50 bg-red-950/20"
                      : entries.length > 0 ? "border-slate-600/50 bg-slate-800/70"
                      : "border-slate-700/30 bg-slate-800/30"
                    }`}>
                    {/* Logistics dots */}
                    <div className="flex gap-0.5 mb-0.5">
                      {hasFlight && <span className="text-xs">✈️</span>}
                      {hasHotel  && <span className="text-xs">🌙</span>}
                      {hasConflict && <span className="text-xs">⚠️</span>}
                    </div>
                    {/* Entry pills */}
                    <div className="space-y-0.5">
                      {entries.slice(0,3).map(e => {
                        const ct = COMMITMENT_TYPES.find(t=>t.id===e.type)||COMMITMENT_TYPES[COMMITMENT_TYPES.length-1];
                        const statusColor = STATUS_COLORS[e.status] || STATUS_COLORS.confirmed;
                        return (
                          <div key={e.id} className="flex items-center gap-0.5 rounded px-1 py-0.5"
                            style={{background:ct.color+"22"}}>
                            <span className="text-xs leading-none">{ct.emoji}</span>
                            {e.time && <span className="text-xs text-slate-400 leading-none">{e.time.slice(0,5)}</span>}
                            <span className="w-1.5 h-1.5 rounded-full shrink-0 ml-auto" style={{background:statusColor}}/>
                          </div>
                        );
                      })}
                      {entries.length > 3 && (
                        <div className="text-xs text-slate-500 pl-1">+{entries.length-3}</div>
                      )}
                    </div>
                  </button>
                );
              })}
            </div>
          ))}

          {/* Legend */}
          <div className="flex gap-4 text-xs text-slate-600 mt-2 pt-2 border-t border-slate-700/30 flex-wrap">
            <span><span className="text-emerald-400 mr-1">●</span>Confirmado</span>
            <span><span className="text-amber-400 mr-1">●</span>A confirmar</span>
            <span><span className="text-red-400 mr-1">●</span>Cancelado / Conflito</span>
            <span>· Clica numa célula para ir para esse dia</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── AGENDA ───────────────────────────────────────────────────────────────────
function Agenda({ team, isAdmin, userRole, agenda, setAgenda, pitchData, logistics, broadcastData }) {
  const dateBarRef = useRef(null);
  const [selectedDate, setSelectedDate] = useState("2026-06-11");
  const [showForm, setShowForm]         = useState(false);
  const [formEntry, setFormEntry]       = useState(null);
  const [viewMode,  setViewMode]        = useState("day"); // "day" | "week"
  const [briefingMatchId, setBriefingMatchId] = useState(null); // match id being edited

  const dayEntries    = agenda.filter(e=>e.date===selectedDate && (
    e.personId === "__team__" ? false :
    e.personIds ? e.personIds.length > 0 : !!e.personId
  ));
  const dayMatches    = FIFA_MATCHES.filter(m=>m.date===selectedDate);
  const hasMatchToday = dayMatches.length > 0;

  // ── Conflict detection ──────────────────────────────────────────────────────
  // A conflict = same person, same day, two entries within 60min of each other
  // OR a manual entry overlapping with a logistics flight
  function detectConflicts(date, entries, flights) {
    const issues = [];
    const personEntries = {};
    entries.forEach(e => {
      const ids = e.personIds || (e.personId ? [e.personId] : []);
      ids.forEach(pid => {
        if (!personEntries[pid]) personEntries[pid] = [];
        if (e.time) personEntries[pid].push({id:e.id, time:e.time, label: e.type});
      });
    });
    // Add flights as entries
    (flights||[]).filter(f=>f.date===date).forEach(f => {
      (f.personIds||[]).forEach(pid => {
        if (!personEntries[pid]) personEntries[pid] = [];
        if (f.depTime) personEntries[pid].push({id:"f"+f.id, time:f.depTime, label:"voo"});
      });
    });
    Object.entries(personEntries).forEach(([pid, evts]) => {
      const sorted = evts.filter(e=>e.time).sort((a,b)=>a.time.localeCompare(b.time));
      for (let i=0; i<sorted.length-1; i++) {
        const [h1,m1] = sorted[i].time.split(":").map(Number);
        const [h2,m2] = sorted[i+1].time.split(":").map(Number);
        const diff = (h2*60+m2) - (h1*60+m1);
        if (diff < 60 && diff >= 0) {
          issues.push({personId:parseInt(pid), a:sorted[i], b:sorted[i+1], diff});
        }
      }
    });
    return issues;
  }

  // Game briefings stored in agenda as special entries
  function getGameBriefing(matchId) {
    return agenda.find(e => e.type==="game_briefing" && e.matchId===matchId);
  }
  function saveGameBriefing(matchId, notes) {
    const existing = getGameBriefing(matchId);
    const match = FIFA_MATCHES.find(m=>m.id===matchId);
    if (existing) {
      setAgenda(prev=>prev.map(e=>e.id===existing.id ? {...e, notes} : e));
    } else {
      setAgenda(prev=>[...prev,{id:"brief_"+matchId, date:match?.date||"", personId:"__team__", personIds:[], type:"game_briefing", matchId, notes, time:""}]);
    }
  }

  function blankEntry(personIds=[]) {
    const defaultType = userRole==="comercial" ? "comercial" : userRole==="redes" ? "redes" : "jogo";
    return {id:null,date:selectedDate,personIds,type:defaultType,customType:"",time:"",transportTime:"",notes:"",matchId:null,status:"confirmed",briefing:""};
  }

  function openAdd(personId) { setFormEntry(blankEntry(personId ? [personId] : [])); setShowForm(true); }
  function openEdit(e)       { setFormEntry({...e, personIds: e.personIds || (e.personId ? [e.personId] : [])}); setShowForm(true); }

  function saveEntry(f) {
    if (!f.personIds || f.personIds.length === 0) return;
    // Backward compat: keep personId as first person for legacy reads
    const entry = {...f, personId: f.personIds[0]};
    if (f.id) {
      setAgenda(prev=>prev.map(e=>e.id===f.id ? entry : e));
    } else {
      setAgenda(prev=>[...prev,{...entry, id:Date.now().toString()+Math.random()}]);
    }
    setShowForm(false);
  }

  function deleteEntry(id)  { setAgenda(prev=>prev.filter(e=>e.id!==id)); }
  function toggleDone(id)   { setAgenda(prev=>prev.map(e=>e.id===id?{...e,done:!e.done}:e)); }

  // Scroll selected date chip into view
  useEffect(()=>{
    if (!dateBarRef.current) return;
    const btn = dateBarRef.current.querySelector('[data-active="true"]');
    if (btn) btn.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"});
  }, [selectedDate]);

  // ── Meeting info (hoisted so it's accessible in per-person loop too) ──
  const [showMeetingEdit, setShowMeetingEdit] = useState(false);

  const meetingEntry = agenda.find(e=>e.date===selectedDate && e.personId==="__team__" && e.type==="reuniao_equipa");
  const meetingTime  = meetingEntry?.time || "";

  function saveMeeting(updates) {
    if (meetingEntry) {
      setAgenda(prev=>prev.map(e=>e.id===meetingEntry.id ? {...e,...updates} : e));
    } else {
      setAgenda(prev=>[...prev,{id:"mtg_"+selectedDate,date:selectedDate,personId:"__team__",type:"reuniao_equipa",time:"",notes:"",matchId:null,...updates}]);
    }
  }

  // Per-person city from logistics (used for auto mode detection)
  const withCity = team.map(person=>{
    const hotel = (logistics?.hotels||[]).find(h=>
      h.checkIn<=selectedDate && h.checkOut>selectedDate && (h.personIds||[]).includes(person.id));
    const flights = (logistics?.flights||[])
      .filter(f=>f.date===selectedDate && (f.personIds||[]).includes(person.id))
      .sort((a,b)=>(a.depTime||"").localeCompare(b.depTime||""));
    const city = hotel?.city ||
      (flights.length>0 ? flights[flights.length-1].to?.split(/[·\-]/)[0].trim() : null);
    return {person, city};
  });
  const known        = withCity.filter(x=>x.city);
  const uniqueCities = [...new Set(known.map(x=>x.city))];
  const autoMeetMode = known.length===0 ? null : uniqueCities.length===1 ? "presencial" : "virtual";

  // Override from meeting entry (admin can set manually)
  const modeOverride   = meetingEntry?.modeOverride || null; // "presencial"|"virtual"|null
  const meetMode       = modeOverride || autoMeetMode;

  // Attendees: from meeting entry or all team
  const attendeeIds    = meetingEntry?.attendeeIds || null; // null = all team
  const effectiveAttendees = attendeeIds
    ? team.filter(p=>attendeeIds.includes(p.id))
    : team;

  const modeColor = meetMode==="presencial" ? "#22c55e" : meetMode==="virtual" ? "#3b82f6" : "#64748b";
  const modeLabel = meetMode==="presencial" ? "🤝 Presencial" : meetMode==="virtual" ? "💻 Virtual" : "❓ Localização desconhecida";
  const modeDesc  = meetMode==="presencial"
    ? (uniqueCities.length===1 ? `Toda a equipa em ${uniqueCities[0]}` : "Presencial")
    : meetMode==="virtual" ? `Equipa em ${Math.max(uniqueCities.length,1)} cidades`
    : "Sem dados de logística";

  // ── Split matches: broadcast vs others ──
  const broadcastMatches = dayMatches.filter(m=>broadcastData?.[m.id]?.enabled);
  const otherMatches     = dayMatches.filter(m=>!broadcastData?.[m.id]?.enabled);

  return (
    <div className="space-y-3">
      {showForm && formEntry && (
        <EntryForm entry={formEntry} team={team} date={selectedDate} userRole={userRole}
          onSave={saveEntry} onClose={()=>setShowForm(false)} onDelete={deleteEntry}/>
      )}

      {/* View toggle + add button */}
      <div className="flex items-center gap-2">
        <div className="flex bg-slate-800 border border-slate-700 rounded-xl p-0.5 gap-0.5">
          {[{id:"day",label:"📋 Dia"},{id:"week",label:"📅 Semana"}].map(v=>(
            <button key={v.id} onClick={()=>setViewMode(v.id)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${viewMode===v.id?"bg-emerald-600 text-white":"text-slate-400 hover:text-slate-200"}`}>
              {v.label}
            </button>
          ))}
        </div>
        <div className="flex-1"/>
        {(isAdmin || userRole==="transmite" || userRole==="comercial" || userRole==="redes") && viewMode==="day" && (
          <button onClick={()=>openAdd(null)}
            className="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-medium transition-colors">
            + Compromisso
          </button>
        )}
      </div>

      {/* ── WEEK VIEW ── */}
      {viewMode==="week" && (
        <WeekView
          selectedDate={selectedDate}
          setSelectedDate={d=>{ setSelectedDate(d); setViewMode("day"); }}
          agenda={agenda}
          team={team}
          logistics={logistics}
          broadcastData={broadcastData}
          isAdmin={isAdmin}
        />
      )}

      {/* ── DAY VIEW ── */}
      {viewMode==="day" && (<>

      {/* Date bar */}
      <div ref={dateBarRef} className="flex gap-1.5 overflow-x-auto no-scrollbar pb-1 -mx-1 px-1">
        {AGENDA_DATES.map(d=>{
          const hasEntries  = agenda.some(e=>e.date===d && e.personId!=="__team__");
          const hasMatch    = FIFA_MATCHES.some(m=>m.date===d);
          const hasLogistic = (logistics?.flights||[]).some(f=>f.date===d) ||
                              (logistics?.hotels||[]).some(h=>h.checkIn===d);
          const isActive    = d===selectedDate;
          // Conflict indicator
          const dEntries = agenda.filter(e=>e.date===d && e.personId!=="__team__" && (e.personIds?.length>0||e.personId));
          const hasConflict = detectConflicts(d, dEntries, logistics?.flights).length > 0;
          return (
            <button key={d} data-active={isActive} onClick={()=>setSelectedDate(d)}
              className={`flex flex-col items-center px-2.5 py-1.5 rounded-xl border text-xs whitespace-nowrap shrink-0 transition-all ${
                isActive?"bg-emerald-600 border-emerald-500 text-white font-semibold"
                :"border-slate-700 bg-slate-800/60 text-slate-400 hover:text-slate-200"
              }`}>
              <span>{fmtDayChip(d)}</span>
              <div className="flex gap-1 mt-0.5">
                {hasMatch    && <span className="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"/>}
                {hasEntries  && <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block"/>}
                {hasLogistic && <span className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block"/>}
                {hasConflict && <span className="w-1.5 h-1.5 rounded-full bg-red-500 inline-block"/>}
              </div>
            </button>
          );
        })}
      </div>

      {/* Day header */}
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <div>
          <div className="text-sm font-semibold text-slate-200 capitalize">{fmtDayHeader(selectedDate)}</div>
          {hasMatchToday && (
            <div className="text-xs text-amber-400 mt-0.5">
              ⚽ {dayMatches.length} jogo{dayMatches.length!==1?"s":""} neste dia
            </div>
          )}
        </div>
      </div>

      {/* ── CONFLICT ALERTS ── */}
      {(()=>{
        const conflicts = detectConflicts(selectedDate, dayEntries, logistics?.flights);
        if (conflicts.length === 0) return null;
        return (
          <div className="rounded-2xl border border-red-500/40 bg-red-950/20 px-4 py-3 space-y-1.5">
            <div className="flex items-center gap-2 text-xs font-bold text-red-400 uppercase tracking-wider">
              ⚠️ {conflicts.length} conflito{conflicts.length!==1?"s":""} de horário
            </div>
            {conflicts.map((c,i) => {
              const p = team.find(x=>x.id===c.personId);
              return (
                <div key={i} className="text-xs text-red-300 flex items-center gap-2">
                  {p && <span style={{color:p.color}}>●</span>}
                  <span>{p?.name.split(" ")[0] || "?"}</span>
                  <span className="text-red-400/70">·</span>
                  <span className="text-red-200">{c.a.time} ({c.a.label})</span>
                  <span className="text-red-400/70">e</span>
                  <span className="text-red-200">{c.b.time} ({c.b.label})</span>
                  <span className="text-red-400/70">— apenas {c.diff}min de intervalo</span>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ── Reunião de Equipa ── */}
      <div className="rounded-2xl border overflow-hidden" style={{borderColor:modeColor+"44"}}>
        {/* Header */}
        <div className="flex items-center gap-3 px-4 py-3" style={{background:modeColor+"11"}}>
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0"
            style={{background:modeColor+"22",color:modeColor}}>🗓️</div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-sm font-semibold text-slate-200">Reunião de Equipa</span>
              <span className="text-xs px-2 py-0.5 rounded-full font-medium border"
                style={{background:modeColor+"22",color:modeColor,borderColor:modeColor+"44"}}>
                {modeLabel}
              </span>
              {modeOverride && (
                <span className="text-xs text-slate-500 italic">manual</span>
              )}
            </div>
            <div className="text-xs mt-0.5" style={{color:modeColor+"cc"}}>{modeDesc}</div>
          </div>
          {/* Time */}
          {isAdmin ? (
            <input type="time" value={meetingTime}
              onChange={e=>saveMeeting({time:e.target.value})}
              className="text-sm font-semibold bg-slate-700/60 border border-slate-600 rounded-xl px-2.5 py-1.5 text-slate-200 outline-none shrink-0 w-28"
              title="Horário da reunião"/>
          ) : meetingTime ? (
            <span className="text-sm font-semibold text-slate-200 shrink-0">🕐 {meetingTime}</span>
          ) : null}
          {/* Edit toggle — admin only */}
          {isAdmin && (
            <button onClick={()=>setShowMeetingEdit(v=>!v)}
              className={`p-1.5 rounded-lg transition-colors shrink-0 ${showMeetingEdit?"bg-emerald-500/20 text-emerald-400":"text-slate-500 hover:text-slate-300 hover:bg-slate-700/50"}`}
              title="Editar reunião">✏️</button>
          )}
        </div>

        {/* Editable panel — admin only */}
        {isAdmin && showMeetingEdit && (
          <div className="px-4 py-3 bg-slate-800/60 border-t border-slate-700/40 space-y-3">
            {/* Mode selector */}
            <div>
              <div className="text-xs text-slate-400 mb-1.5 font-medium">Formato</div>
              <div className="flex gap-2">
                {[
                  {val:null,    label:"🔄 Auto",        desc:"Definido pela logística"},
                  {val:"presencial", label:"🤝 Presencial", desc:"Equipa no mesmo local"},
                  {val:"virtual",    label:"💻 Virtual",    desc:"Online / por videochamada"},
                ].map(opt=>(
                  <button key={String(opt.val)} onClick={()=>saveMeeting({modeOverride:opt.val})}
                    className={`flex-1 px-2 py-1.5 rounded-xl border text-xs font-medium transition-colors ${
                      modeOverride===opt.val
                        ? "bg-emerald-600/20 border-emerald-500/50 text-emerald-300"
                        : "border-slate-600 text-slate-400 hover:text-slate-200 hover:border-slate-500"
                    }`}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
            {/* Attendees */}
            <div>
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-xs text-slate-400 font-medium">Participantes</span>
                <button onClick={()=>saveMeeting({attendeeIds:null})}
                  className="text-xs text-slate-500 hover:text-slate-300 transition-colors">
                  Todos
                </button>
              </div>
              <div className="flex gap-2 flex-wrap">
                {team.map(p=>{
                  const isIn = attendeeIds===null || attendeeIds.includes(p.id);
                  function toggleAttendee() {
                    const cur = attendeeIds===null ? team.map(x=>x.id) : [...attendeeIds];
                    const next = cur.includes(p.id) ? cur.filter(id=>id!==p.id) : [...cur,p.id];
                    saveMeeting({attendeeIds: next.length===team.length ? null : next});
                  }
                  return (
                    <button key={p.id} onClick={toggleAttendee}
                      className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full border text-xs font-medium transition-colors ${
                        isIn
                          ? "border-current"
                          : "border-slate-700 text-slate-600 opacity-50"
                      }`}
                      style={isIn ? {color:p.color,background:p.color+"22",borderColor:p.color+"55"} : {}}>
                      <Avatar name={p.name} color={isIn?p.color:"#64748b"} size="sm"/>
                      {p.name.split(" ")[0]}
                      {!isIn && <span className="text-slate-600">✕</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* Attendees display row */}
        <div className="px-4 py-2.5 flex gap-2 flex-wrap bg-slate-800/40">
          {effectiveAttendees.length > 0 ? effectiveAttendees.map(person=>{
            const wc = withCity.find(x=>x.person.id===person.id);
            const city = wc?.city;
            return (
              <div key={person.id} className="flex items-center gap-1.5 text-xs bg-slate-700/50 border border-slate-600/50 rounded-full px-2.5 py-1">
                <Avatar name={person.name} color={person.color} size="sm"/>
                <span style={{color:person.color}} className="font-medium">{person.name.split(" ")[0]}</span>
                <span className="text-slate-400">{city ? `· 📍 ${city}` : "· ?"}</span>
              </div>
            );
          }) : (
            <span className="text-xs text-slate-600 italic">Sem equipa definida.</span>
          )}
        </div>
      </div>

      {/* ── EM DIRETO NA LIVEMODETV ── */}
      {broadcastMatches.length > 0 && (
        <div className="rounded-2xl border border-red-600/40 overflow-hidden">
          <div className="flex items-center gap-3 px-4 py-3 bg-red-600/10">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0 bg-red-600/20 text-red-400">📡</div>
            <div className="flex-1 min-w-0">
              <span className="text-sm font-bold text-red-300 uppercase tracking-wide">EM DIRETO NA LIVEMODETV</span>
            </div>
          </div>
          <div className="divide-y divide-slate-700/30 bg-slate-800/40">
            {broadcastMatches.map(m=>{
              const bc = broadcastData[m.id];
              const koLocal   = m.time;
              const koPT      = ptTime(m.time, m.city);
              const preLocal  = bc.preGame  ? localFromPT(bc.preGame,  m.city) : null;
              const postLocal = bc.postGame ? localFromPT(bc.postGame, m.city) : null;
              const md        = pitchData?.[m.id];
              const contracted = md?.inLoco
                ? Object.entries(md.positions||{})
                    .map(([posId,pd])=>({posId,pd,cat:PITCH_POSITIONS_CATALOG.find(p=>p.id===posId)}))
                    .filter(x=>x.cat)
                    .sort((a,b)=>(a.pd.time||"99:99").localeCompare(b.pd.time||"99:99"))
                : [];
              function TimeCell({label, pt, local}) {
                return (
                  <div className="flex flex-col gap-0.5 min-w-[7rem]">
                    <span className="text-slate-500 text-xs">{label}</span>
                    {pt ? (
                      <>
                        <span className="font-semibold text-slate-200 text-xs">🇵🇹 {pt} <span className="text-slate-500 font-normal">PT</span></span>
                        {local && <span className="text-slate-400 text-xs">⏰ {local} <span className="text-slate-500">local</span></span>}
                      </>
                    ) : <span className="text-slate-600 italic text-xs">—</span>}
                  </div>
                );
              }
              return (
                <div key={m.id} className="px-4 py-3 space-y-2">
                  <div className="flex items-center gap-2 flex-wrap text-xs">
                    <span className="font-bold text-amber-400">#{m.id}</span>
                    <span className="font-semibold text-slate-200">{tTeam(m.home)} × {tTeam(m.away)}</span>
                    <Badge color={STAGE_COLORS[m.stage]||"#64748b"}>{tStage(m.stage)}</Badge>
                    <span className="text-slate-500">· {m.city}</span>
                  </div>
                  <div className="flex gap-4 flex-wrap">
                    <TimeCell label="⏱ Início pré-jogo" pt={bc.preGame||null} local={preLocal}/>
                    <TimeCell label="⚽ Kick-off"        pt={koPT}            local={koLocal}/>
                    <TimeCell label="🏁 Fim pós-jogo"   pt={bc.postGame||null} local={postLocal}/>
                  </div>
                  {contracted.length>0 && (
                    <div className="border-t border-slate-700/30 pt-2 space-y-1">
                      {contracted.map(({posId,pd,cat})=>{
                        const people = (pd.personIds||[]).map(pid=>team.find(p=>p.id===pid)).filter(Boolean);
                        return (
                          <div key={posId} className="flex items-center gap-2 text-xs flex-wrap">
                            <span>{cat.emoji}</span>
                            <span className="text-slate-300">{cat.label}</span>
                            {pd.time&&<span className="text-slate-500">🕐 {pd.time} / 🇵🇹 {ptTime(pd.time,m.city)}</span>}
                            <div className="flex gap-1 flex-wrap">
                              {people.map(p=>(
                                <span key={p.id} style={{color:p.color,background:p.color+"22",borderColor:p.color+"44"}}
                                  className="px-2 py-0.5 rounded-full border font-medium">{p.name.split(" ")[0]}</span>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {/* Game Briefing */}
                  {(()=>{
                    const brief = getGameBriefing(m.id);
                    const isEditing = briefingMatchId === m.id;
                    if (!isAdmin && !brief?.notes) return null;
                    return (
                      <div className="border-t border-slate-700/30 pt-2">
                        <div className="flex items-center justify-between mb-1.5">
                          <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">📋 Briefing do Jogo</span>
                          {isAdmin && (
                            <button onClick={()=>setBriefingMatchId(isEditing?null:m.id)}
                              className="text-xs text-slate-500 hover:text-emerald-400 transition-colors">
                              {isEditing ? "✓ Fechar" : "✏️ Editar"}
                            </button>
                          )}
                        </div>
                        {isAdmin && isEditing ? (
                          <textarea
                            defaultValue={brief?.notes||""}
                            onBlur={e=>saveGameBriefing(m.id, e.target.value)}
                            rows={4}
                            placeholder="Credenciais a levar, ponto de encontro, nome do responsável FIFA, acesso ao estádio, dress code, observações…"
                            className="w-full px-3 py-2 bg-slate-700/60 border border-slate-600 rounded-xl text-xs text-slate-200 placeholder-slate-500 outline-none resize-none"/>
                        ) : brief?.notes ? (
                          <div className="text-xs text-slate-300 whitespace-pre-wrap bg-slate-800/60 rounded-xl px-3 py-2 border border-slate-700/40">
                            {brief.notes}
                          </div>
                        ) : (
                          <div className="text-xs text-slate-600 italic">Sem briefing ainda. Clica em Editar para adicionar.</div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── OUTRAS PARTIDAS ── */}
      {otherMatches.length > 0 && (
        <div className="rounded-2xl border border-amber-500/20 overflow-hidden">
          <div className="flex items-center gap-3 px-4 py-3 bg-amber-500/8">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0 bg-amber-500/15 text-amber-400">⚽</div>
            <span className="text-sm font-bold text-amber-300 uppercase tracking-wide">OUTRAS PARTIDAS</span>
          </div>
          <div className="divide-y divide-slate-700/30 bg-slate-800/40">
            {otherMatches.map(m=>{
              const md = pitchData?.[m.id];
              const contracted = md?.inLoco
                ? Object.entries(md.positions||{})
                    .map(([posId,pd])=>({posId,pd,cat:PITCH_POSITIONS_CATALOG.find(p=>p.id===posId)}))
                    .filter(x=>x.cat)
                    .sort((a,b)=>(a.pd.time||"99:99").localeCompare(b.pd.time||"99:99"))
                : [];
              return (
                <div key={m.id} className="px-4 py-3 space-y-1.5">
                  <div className="flex items-center gap-2 flex-wrap text-xs">
                    <span className="font-bold text-amber-400">#{m.id}</span>
                    <span className="font-medium text-slate-200">{tTeam(m.home)} × {tTeam(m.away)}</span>
                    <span className="text-slate-400">· {m.city} · ⏰ {m.time} <span className="text-slate-500">local</span> / 🇵🇹 {ptTime(m.time,m.city)} <span className="text-slate-500">PT</span></span>
                    <Badge color={STAGE_COLORS[m.stage]||"#64748b"}>{tStage(m.stage)}</Badge>
                    {md?.inLoco && <span className="bg-emerald-600/20 border border-emerald-700/40 text-emerald-400 px-2 py-0.5 rounded-lg">📋 In loco</span>}
                  </div>
                  {contracted.length>0 && (
                    <div className="space-y-1 pl-1">
                      {contracted.map(({posId,pd,cat})=>{
                        const people = (pd.personIds||[]).map(pid=>team.find(p=>p.id===pid)).filter(Boolean);
                        return (
                          <div key={posId} className="flex items-center gap-2 text-xs flex-wrap">
                            <span>{cat.emoji}</span>
                            <span className="text-slate-300">{cat.label}</span>
                            {pd.time&&<span className="text-slate-500">🕐 {pd.time} / 🇵🇹 {ptTime(pd.time,m.city)}</span>}
                            <div className="flex gap-1 flex-wrap">
                              {people.map(p=>(
                                <span key={p.id} style={{color:p.color,background:p.color+"22",borderColor:p.color+"44"}}
                                  className="px-2 py-0.5 rounded-full border font-medium">{p.name.split(" ")[0]}</span>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Team members for this day */}
      {team.length===0 && (
        <div className="py-10 text-center text-slate-500 text-sm">Adicione membros na aba Equipa.</div>
      )}

      <div className="space-y-3">
        {team.map(person=>{
          // Support both personIds (new) and personId (legacy)
          const entries = dayEntries.filter(e=>{
            const ids = e.personIds || (e.personId ? [e.personId] : []);
            return ids.includes(person.id);
          }).sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99"));

          // ── Auto logistics for this person ──
          const logFlights = (logistics?.flights||[])
            .filter(f=>f.date===selectedDate && (f.personIds||[]).includes(person.id))
            .sort((a,b)=>(a.depTime||"").localeCompare(b.depTime||""));

          // Find hotels: "wake up" hotel = checked in before today and checks out today or after
          // "sleep" hotel = checks in today
          const allHotels = logistics?.hotels || [];
          const hotelWake  = allHotels.find(h =>
            h.checkIn < selectedDate && h.checkOut === selectedDate &&
            (h.personIds||[]).includes(person.id)) || null;
          const hotelSleep = allHotels.find(h =>
            h.checkIn === selectedDate &&
            (h.personIds||[]).includes(person.id)) || null;
          // Standard: staying hotel (checked in before, checks out after today)
          const hotelStay  = allHotels.find(h =>
            h.checkIn <= selectedDate && h.checkOut > selectedDate &&
            (h.personIds||[]).includes(person.id)) || null;

          // Determine which hotel(s) to show
          const hasDualHotel = hotelWake && hotelSleep;
          const logHotel = hasDualHotel ? null : hotelStay;

          // City: prefer stay hotel, then sleep hotel, then last flight destination
          const personCity = hotelStay?.city || hotelSleep?.city ||
            (logFlights.length>0 ? logFlights[logFlights.length-1].to?.split(/[·\-]/)[0].trim() : null);

          // Merge manual entries with flights into a single sorted timeline
          const timelineItems = [
            ...entries.map(e=>({_k:"manual", _sort:e.time||"99:99", data:e})),
            ...logFlights.map(f=>({_k:"flight", _sort:f.depTime||"99:99", data:f})),
          ].sort((a,b)=>a._sort.localeCompare(b._sort));

          const hasAnything = timelineItems.length>0 || logHotel || hasDualHotel;

          return (
            <div key={person.id} className="bg-slate-800/70 rounded-2xl border border-slate-700/50 overflow-hidden">
              {/* Person header */}
              <div className="flex items-center gap-3 px-4 py-3 border-b border-slate-700/40">
                <Avatar name={person.name} color={person.color} size="sm"/>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm font-semibold text-slate-200">{person.name}</span>
                    {person.role&&<span className="text-xs text-slate-500">{person.role}</span>}
                    {personCity&&(
                      <span className="flex items-center gap-1 text-xs bg-slate-700/60 border border-slate-600/50 text-slate-300 px-2 py-0.5 rounded-full">
                        📍 {personCity}
                      </span>
                    )}
                  </div>
                </div>
                {(isAdmin || userRole==="transmite" || userRole==="comercial" || userRole==="redes")&&(
                  <button onClick={()=>openAdd(person.id)}
                    className="text-xs text-slate-400 hover:text-emerald-400 transition-colors px-2 py-1 rounded-lg hover:bg-emerald-400/10 shrink-0">
                    + adicionar
                  </button>
                )}
              </div>

              {/* Timeline: sempre começa com Reunião de Equipa (se participar), depois manual entries + auto flights */}
              <div className="divide-y divide-slate-700/30">
                {/* Reunião de Equipa — sempre primeiro, só se a pessoa participar */}
                {(attendeeIds===null || attendeeIds.includes(person.id)) && (
                  <div className="px-4 py-2.5 flex items-center gap-3" style={{background:modeColor+"08"}}>
                    <div className="w-7 h-7 rounded-lg flex items-center justify-center text-sm shrink-0"
                      style={{background:modeColor+"22",color:modeColor}}>🗓️</div>
                    <div className="flex-1 min-w-0">
                      <span className="text-xs font-semibold text-slate-300">Reunião de Equipa</span>
                      <span className="text-xs ml-2 px-1.5 py-0.5 rounded-full font-medium"
                        style={{background:modeColor+"22",color:modeColor}}>{modeLabel}</span>
                    </div>
                    {meetingTime
                      ? <span className="text-xs font-semibold text-slate-200 shrink-0">🕐 {meetingTime}</span>
                      : <span className="text-xs text-slate-600 italic shrink-0">hora por definir</span>}
                  </div>
                )}
                {!hasAnything && (
                  <div className="px-4 py-3 text-xs text-slate-600 italic">Sem outros compromissos neste dia.</div>
                )}
                  {timelineItems.map(item=>{
                    if (item._k==="manual") {
                      const e = item.data;
                      const ct = cType(e.type);
                      const linkedMatch = e.matchId ? FIFA_MATCHES.find(m=>m.id===e.matchId) : null;
                      const canEdit = isAdmin || userRole==="transmite" ||
                        (userRole==="comercial" && e.type==="comercial") ||
                        (userRole==="redes" && e.type==="redes");
                      return <EntryCard key={e.id} e={e} ct={ct} linkedMatch={linkedMatch}
                               isAdmin={isAdmin} canEdit={canEdit} onEdit={()=>openEdit(e)} onToggleDone={()=>toggleDone(e.id)}
                               team={team} currentPersonId={person.id}/>;
                    }
                    // Auto flight entry
                    const f = item.data;
                    return (
                      <div key={"f"+f.id} className="px-4 py-3">
                        <div className="flex items-start gap-3">
                          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0 mt-0.5"
                            style={{background:"#3b82f622",color:"#3b82f6"}}>✈️</div>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-sm font-semibold text-slate-200">
                                {f.from||"?"} → {f.to||"?"}
                              </span>
                              {f.flightNo&&<span className="text-xs bg-slate-700 text-slate-400 px-1.5 py-0.5 rounded-full">{f.flightNo}</span>}
                            </div>
                            <div className="text-xs text-slate-400 mt-0.5 flex gap-3 flex-wrap">
                              {f.depTime&&<span>🛫 {f.depTime}</span>}
                              {f.arrTime&&<span>🛬 {f.arrTime}</span>}
                            </div>
                            {f.notes&&<div className="text-xs text-slate-500 mt-0.5">{f.notes}</div>}
                          </div>
                          <span className="text-xs text-blue-400 shrink-0 mt-1">auto</span>
                        </div>
                      </div>
                    );
                  })}

                  {/* Hotel(s) — always at the bottom */}
                  {hasDualHotel ? (
                    <div className="px-4 py-3 bg-teal-950/20 space-y-2">
                      {/* Hotel where they woke up (checking out today) */}
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0"
                          style={{background:"#f59e0b22",color:"#f59e0b"}}>🌅</div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-xs text-slate-500 font-medium">Acordou em</span>
                            <span className="text-sm font-semibold text-slate-200">{hotelWake.name||"—"}</span>
                            {hotelWake.city&&<span className="text-xs text-slate-400">📍 {hotelWake.city}</span>}
                            <span className="text-xs text-amber-600/70">check-out</span>
                          </div>
                          {hotelWake.notes&&<div className="text-xs text-slate-500 mt-0.5">{hotelWake.notes}</div>}
                        </div>
                        <span className="text-xs text-amber-400/60 shrink-0">auto</span>
                      </div>
                      {/* Hotel where they sleep (checking in today) */}
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0"
                          style={{background:"#14b8a622",color:"#14b8a6"}}>🌙</div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-xs text-slate-500 font-medium">Dorme em</span>
                            <span className="text-sm font-semibold text-slate-200">{hotelSleep.name||"—"}</span>
                            {hotelSleep.city&&<span className="text-xs text-slate-400">📍 {hotelSleep.city}</span>}
                            <span className="text-xs text-teal-600/70">check-in</span>
                          </div>
                          {hotelSleep.notes&&<div className="text-xs text-slate-500 mt-0.5">{hotelSleep.notes}</div>}
                        </div>
                        <span className="text-xs text-teal-400 shrink-0">auto</span>
                      </div>
                    </div>
                  ) : logHotel ? (
                    <div className="px-4 py-3 bg-teal-950/20">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0"
                          style={{background:"#14b8a622",color:"#14b8a6"}}>🌙</div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-sm font-semibold text-slate-200">{logHotel.name||"—"}</span>
                            {logHotel.city&&<span className="text-xs text-slate-400">📍 {logHotel.city}</span>}
                          </div>
                          {logHotel.notes&&<div className="text-xs text-slate-500 mt-0.5">{logHotel.notes}</div>}
                        </div>
                        <span className="text-xs text-teal-400 shrink-0">auto</span>
                      </div>
                    </div>
                  ) : null}
              </div>
            </div>
          );
        })}
      </div>

      </>)} {/* end day view */}
    </div>
  );
}

function EntryCard({ e, ct, linkedMatch, isAdmin, canEdit, onEdit, onToggleDone, team, currentPersonId }) {
  const done = !!e.done;
  // Collect other persons on this shared entry (all except the card we're inside)
  const personIds = e.personIds || (e.personId ? [e.personId] : []);
  const otherPersons = team
    ? personIds.filter(id=>id!==currentPersonId).map(id=>team.find(p=>p.id===id)).filter(Boolean)
    : [];
  return (
    <div className={`px-4 py-3 transition-colors ${done ? "bg-slate-800/30" : ""}`}>
      <div className="flex items-start gap-3">
        {/* Done toggle — admin only */}
        {isAdmin && (
          <button onClick={onToggleDone}
            title={done ? "Marcar como pendente" : "Marcar como feito"}
            className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 mt-1.5 transition-colors ${
              done
                ? "bg-emerald-500 border-emerald-500 text-white"
                : "border-slate-600 hover:border-emerald-500 text-transparent hover:text-emerald-500"
            }`}>
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-2.5 h-2.5">
              <polyline points="1.5,6 4.5,9 10.5,3"/>
            </svg>
          </button>
        )}
        <div style={{background:done ? "#64748b22" : ct.color+"22", color: done ? "#64748b" : ct.color}}
          className="w-8 h-8 rounded-lg flex items-center justify-center text-base shrink-0 mt-0.5">
          {ct.emoji}
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className={`text-sm font-semibold ${done ? "line-through text-slate-500" : "text-slate-200"}`}>
              {e.type==="outro"&&e.customType ? e.customType : ct.label}
            </span>
            {e.time&&<span className={`text-xs ${done ? "text-slate-600" : "text-slate-500"}`}>🕐 {e.time}</span>}
            {!done && e.status==="pending"   && <span className="text-xs text-amber-400 font-medium">⏳ a confirmar</span>}
            {!done && e.status==="cancelled" && <span className="text-xs text-red-400 font-medium">❌ cancelado</span>}
            {done && <span className="text-xs text-emerald-600 font-medium">✓ feito</span>}
          </div>
          {/* Other persons sharing this entry */}
          {otherPersons.length > 0 && (
            <div className="flex items-center gap-1 mt-0.5 flex-wrap">
              <span className="text-xs text-slate-600">com</span>
              {otherPersons.map(p=>(
                <span key={p.id} className="text-xs px-1.5 py-0.5 rounded-full font-medium"
                  style={{background:p.color+"22",color:p.color}}>
                  {p.name.split(" ")[0]}
                </span>
              ))}
            </div>
          )}
          {e.transportTime&&(
            <div className={`text-xs mt-0.5 flex items-center gap-1 font-medium ${done ? "text-slate-600" : "text-blue-400"}`}>
              🚌 Transporte: {e.transportTime}
            </div>
          )}
          {linkedMatch&&(
            <div className={`text-xs mt-0.5 ${done ? "text-slate-600" : "text-amber-400"}`}>
              ⚽ #{linkedMatch.id} {tTeam(linkedMatch.home)} × {tTeam(linkedMatch.away)} · {linkedMatch.city}
            </div>
          )}
          {e.notes&&<div className={`text-xs mt-1 whitespace-pre-wrap ${done ? "text-slate-600" : "text-slate-400"}`}>{e.notes}</div>}
        </div>
        {(canEdit ?? isAdmin)&&(
          <button onClick={onEdit} className="p-1 text-slate-600 hover:text-slate-300 transition-colors shrink-0">✏️</button>
        )}
      </div>
    </div>
  );
}

// ── PITCH TAB ────────────────────────────────────────────────────────────────
function PitchTab({ team, isAdmin, userRole, pitchData, setPitchData }) {
  const [expandedId,  setExpandedId]  = useState(null);
  const [stageFilter, setStageFilter] = useState("all");

  function getMD(mid)       { return pitchData[mid] || {inLoco:false, positions:{}}; }
  function setMD(mid, d)    { setPitchData(p=>({...p, [mid]:d})); }

  function toggleInLoco(mid) {
    const d = getMD(mid);
    setMD(mid, {...d, inLoco:!d.inLoco});
    if (!d.inLoco) setExpandedId(mid);
  }

  function togglePos(mid, posId) {
    const d = getMD(mid);
    const pos = {...d.positions};
    if (pos[posId]) { delete pos[posId]; }
    else            { pos[posId] = {time:"", personIds:[], notes:""}; }
    setMD(mid, {...d, positions:pos});
  }

  function updatePos(mid, posId, updates) {
    const d = getMD(mid);
    setMD(mid, {...d, positions:{...d.positions, [posId]:{...d.positions[posId], ...updates}}});
  }

  function matchCost(mid) {
    return Object.keys(getMD(mid).positions).reduce((s,pid)=>s+(PITCH_POSITIONS_CATALOG.find(p=>p.id===pid)?.price||0),0);
  }

  const inLocoMatches = FIFA_MATCHES.filter(m=>getMD(m.id).inLoco);
  const totalCost     = inLocoMatches.reduce((s,m)=>s+matchCost(m.id), 0);
  const totalPos      = inLocoMatches.reduce((s,m)=>s+Object.keys(getMD(m.id).positions).length, 0);
  const baseMatches   = (isAdmin || userRole==="financeiro") ? FIFA_MATCHES : FIFA_MATCHES.filter(m=>getMD(m.id).inLoco);
  const filtered      = stageFilter==="all" ? baseMatches : baseMatches.filter(m=>m.stage===stageFilter);

  // Sinergia pitch: Presentation Position + Centre Circle em jogos de Portugal ÷2
  const SINERGIA_PITCH_IDS = ["touchline_partial","touchline_knockout","centre_circle"];
  const sinergiaPitchUSD = inLocoMatches.reduce((s,m)=>{
    if (m.home !== "Portugal" && m.away !== "Portugal") return s;
    const md = getMD(m.id);
    return s + SINERGIA_PITCH_IDS.reduce((ss,posId)=>{
      if (!md.positions[posId]) return ss;
      const pos = PITCH_POSITIONS_CATALOG.find(p=>p.id===posId);
      return ss + (pos?.price||0);
    },0);
  },0) / 2;

  // Group catalog by category
  const bycat = {};
  PITCH_POSITIONS_CATALOG.forEach(p=>{ if(!bycat[p.cat]) bycat[p.cat]=[]; bycat[p.cat].push(p); });

  return (
    <div className="space-y-4">
      {/* Stats */}
      <div className="grid grid-cols-3 gap-2">
        <div className="bg-slate-800/70 rounded-2xl border border-slate-700/50 p-3 text-center">
          <div className="text-2xl font-bold text-emerald-400">{inLocoMatches.length}</div>
          <div className="text-xs text-slate-400 mt-0.5">Jogos in loco</div>
        </div>
        <div className="bg-slate-800/70 rounded-2xl border border-slate-700/50 p-3 text-center">
          <div className="text-2xl font-bold text-blue-400">{totalPos}</div>
          <div className="text-xs text-slate-400 mt-0.5">Posições</div>
        </div>
        {isAdmin ? (
          <div className="bg-slate-800/70 rounded-2xl border border-amber-700/30 p-3 text-center">
            <div className="text-lg font-bold text-amber-400">${totalCost.toLocaleString()}</div>
            <div className="text-xs text-slate-400 mt-0.5">Custo total 🔒</div>
            {sinergiaPitchUSD > 0 && (
              <div className="text-xs text-emerald-400 font-semibold mt-1">-${sinergiaPitchUSD.toLocaleString()} sin.</div>
            )}
          </div>
        ) : (
          <div className="bg-slate-800/70 rounded-2xl border border-slate-700/50 p-3 text-center opacity-30">
            <div className="text-lg font-bold text-slate-500">—</div>
            <div className="text-xs text-slate-500 mt-0.5">Orçamento</div>
          </div>
        )}
      </div>

      {/* Sinergia summary banner — admin only, when applicable */}
      {isAdmin && sinergiaPitchUSD > 0 && (
        <div className="rounded-2xl border border-emerald-700/40 bg-emerald-950/20 px-4 py-3 flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div className="text-xs font-semibold text-emerald-400 uppercase tracking-wider mb-0.5">💚 Sinergia Portugal–Brasil</div>
            <div className="text-xs text-slate-400">
              Presentation Position + Centre Circle em jogos de Portugal ÷2
            </div>
          </div>
          <div className="text-right shrink-0">
            <div className="text-xs text-slate-400">Total Pitch</div>
            <div className="text-amber-400 font-bold">${totalCost.toLocaleString()}</div>
            <div className="text-xs text-slate-400 mt-0.5">Desconto sinergia</div>
            <div className="text-emerald-400 font-bold">-${sinergiaPitchUSD.toLocaleString()}</div>
            <div className="border-t border-emerald-700/30 mt-1 pt-1">
              <div className="text-xs text-slate-400">Custo líquido</div>
              <div className="text-emerald-300 font-bold">${(totalCost - sinergiaPitchUSD).toLocaleString()}</div>
            </div>
          </div>
        </div>
      )}

      {/* Stage filter */}
      <div className="flex gap-1.5 overflow-x-auto no-scrollbar pb-0.5">
        {["all",...STAGE_ORDER].map(s=>(
          <button key={s} onClick={()=>setStageFilter(s)}
            className={`shrink-0 px-3 py-1.5 rounded-xl border text-xs transition-all ${stageFilter===s?"bg-emerald-600 border-emerald-500 text-white":"bg-slate-800/60 border-slate-700 text-slate-400 hover:text-slate-200"}`}>
            {s==="all"?"Todos os jogos":tStage(s)}
          </button>
        ))}
      </div>

      {/* Match list */}
      <div className="space-y-2">
        {filtered.map(m=>{
          const md       = getMD(m.id);
          const posCount = Object.keys(md.positions).length;
          const cost     = matchCost(m.id);
          const isExp    = expandedId===m.id;

          return (
            <div key={m.id}
              className={`bg-slate-800/70 rounded-2xl border overflow-hidden transition-all ${md.inLoco?"border-emerald-700/40":"border-slate-700/50"}`}>

              {/* Match header row */}
              <div className="flex items-center gap-2 px-3 py-2.5">
                <span className="text-xs text-slate-600 w-6 shrink-0 text-center">#{m.id}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-slate-200 truncate">{tTeam(m.home)} × {tTeam(m.away)}</div>
                  <div className="text-xs text-slate-500">{fmtDate(m.date)} · {m.city}</div>
                </div>
                {md.inLoco && posCount>0 && (
                  <div className="text-xs text-slate-400 shrink-0 hidden sm:flex items-center gap-1">
                    <span>{posCount} pos.</span>
                    {isAdmin && cost>0 && <span className="text-amber-400">${cost.toLocaleString()}</span>}
                  </div>
                )}
                {isAdmin ? (
                  <button onClick={()=>toggleInLoco(m.id)}
                    className={`shrink-0 px-2.5 py-1 rounded-xl text-xs font-medium border transition-all ${md.inLoco?"bg-emerald-600/20 border-emerald-600/40 text-emerald-400":"bg-slate-700/50 border-slate-600 text-slate-500 hover:text-slate-300"}`}>
                    {md.inLoco?"✓ In loco":"In loco?"}
                  </button>
                ) : md.inLoco && (
                  <span className="shrink-0 text-xs bg-emerald-600/20 border border-emerald-700/40 text-emerald-400 px-2 py-0.5 rounded-xl">In loco</span>
                )}
                {md.inLoco && (
                  <button onClick={()=>setExpandedId(isExp?null:m.id)}
                    className="shrink-0 w-7 h-7 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-all text-sm">
                    {isExp?"▲":"▼"}
                  </button>
                )}
              </div>

              {/* Positions detail (expanded) */}
              {md.inLoco && isExp && (
                <div className="border-t border-slate-700/50 p-3 space-y-4">
                  {Object.entries(bycat).map(([cat, positions])=>{
                    const catMeta = PITCH_CAT_META[cat] || {label:cat, color:"#94a3b8"};
                    return (
                      <div key={cat}>
                        <div style={{color:catMeta.color}} className="text-xs font-semibold uppercase tracking-wide mb-2">
                          {catMeta.label}
                        </div>
                        <div className="space-y-1.5">
                          {positions.map(pos=>{
                            const contracted = !!md.positions[pos.id];
                            const pd         = md.positions[pos.id] || {time:"",personIds:[],notes:""};
                            return (
                              <div key={pos.id}
                                className={`rounded-xl border overflow-hidden transition-all ${contracted?"border-blue-700/40 bg-blue-950/20":"border-slate-700/30 bg-slate-800/40"}`}>
                                {/* Position row */}
                                <div className="flex items-center gap-2 px-3 py-2">
                                  {isAdmin ? (
                                    <button onClick={()=>togglePos(m.id, pos.id)}
                                      className={`w-4 h-4 rounded border-2 shrink-0 flex items-center justify-center transition-all ${contracted?"bg-blue-600 border-blue-600":"border-slate-600 hover:border-blue-500"}`}>
                                      {contracted&&<span className="text-white text-xs leading-none">✓</span>}
                                    </button>
                                  ) : (
                                    <span className={`w-4 h-4 rounded border-2 shrink-0 flex items-center justify-center ${contracted?"bg-blue-600 border-blue-600":"border-slate-600"}`}>
                                      {contracted&&<span className="text-white text-xs leading-none">✓</span>}
                                    </span>
                                  )}
                                  <span className="text-base shrink-0">{pos.emoji}</span>
                                  <div className="flex-1 min-w-0">
                                    <span className={`text-xs ${contracted?"text-slate-200":"text-slate-400"}`}>{pos.label}</span>

const LS_LOGISTICS_KEY = "livemode_mundial_logistics_v3";
function loadLogistics() {
  try { const s=localStorage.getItem(LS_LOGISTICS_KEY); if(s) return JSON.parse(s); } catch {}
  return { flights:[], hotels:[], transport:{} };
}
// flights:   [{ id, date, flightNo, from, to, depTime, arrTime, price, notes, personIds }]
// hotels:    [{ id, city, name, checkIn, checkOut, price, notes, personIds }]
// transport: { "YYYY-MM-DD": { cost: number, notes: string } }

const BLANK_FLIGHT_L = {id:null,date:"",flightNo:"",from:"",to:"",depTime:"",arrTime:"",pricePerPerson:0,notes:"",personIds:[]};
// Total do voo = pricePerPerson × nº de pessoas (retrocompat: usa price se pricePerPerson ausente)
function flightCost(f) {
  if ((f.pricePerPerson||0) > 0) return (f.pricePerPerson||0) * Math.max(1,(f.personIds||[]).length);
  return f.price || 0;
}
const BLANK_HOTEL_L  = {id:null,city:"",name:"",checkIn:"",checkOut:"",price:0,notes:"",personIds:[]};

function logNights(checkIn, checkOut) {
  if (!checkIn||!checkOut) return 0;
  const d1=new Date(checkIn+"T12:00:00Z"), d2=new Date(checkOut+"T12:00:00Z");
  return Math.max(0, Math.round((d2-d1)/(1000*60*60*24)));
}

// Date range: Jun 8 → Jul 22 2026
const WC_DATES = (()=>{
  const arr=[];
  const cur=new Date("2026-06-08T12:00:00Z");
  const end=new Date("2026-07-22T12:00:00Z");
  while(cur<=end){ arr.push(cur.toISOString().slice(0,10)); cur.setUTCDate(cur.getUTCDate()+1); }
  return arr;
})();
const DOW_PT = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
function dowPT(dateStr) { return DOW_PT[new Date(dateStr+"T12:00:00Z").getUTCDay()]; }
