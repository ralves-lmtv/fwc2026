// ── Portugal time conversion ──────────────────────────────────────────────────
// Portugal summer = UTC+1 (WEST)
const CITY_UTC = {
  "New York/NJ":-4,"Philadelphia":-4,"Boston":-4,"Miami":-4,"Atlanta":-4,"Toronto":-4,
  "Kansas City":-5,"Dallas":-5,"Houston":-5,"Guadalajara":-5,"Monterrey":-5,"Mexico City":-5,
  "Los Angeles":-7,"San Francisco":-7,"Seattle":-7,"Vancouver":-7,
};
function ptTime(localTime, city) {
  const [h, m] = localTime.split(":").map(Number);
  const diff = 1 - (CITY_UTC[city] ?? -5); // Portugal UTC+1 minus city offset
  const total = h + diff;
  const hh = total % 24;
  const plus = total >= 24 ? " +1d" : "";
  return `${String(hh).padStart(2,"0")}:${String(m).padStart(2,"0")}${plus}`;
}
// Reverse: Portugal time → local city time (admin enters PT, display both)
function localFromPT(ptT, city) {
  const clean = (ptT||"").replace(/ [+-]\d+d/,"");
  if (!clean.includes(":")) return "";
  const [h, m] = clean.split(":").map(Number);
  const diff = 1 - (CITY_UTC[city] ?? -5);
  const total = h - diff;
  const hh = ((total % 24) + 24) % 24;
  return `${String(hh).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

// ── Change Password Modal ────────────────────────────────────────────────────
function ChangePwModal({ onClose, userRole }) {
  const [current, setCurrent] = useState("");
  const [next, setNext]       = useState("");
  const [confirm, setConfirm] = useState("");
  const [msg, setMsg]         = useState(null); // {type:"ok"|"err", text}

  function submit(e) {
    e.preventDefault();
    if (checkPassword(current) !== "admin") return setMsg({type:"err", text:"Senha atual incorreta"});
    if (next.length < 4)          return setMsg({type:"err", text:"Nova senha muito curta (mín. 4 caracteres)"});
    if (next !== confirm)          return setMsg({type:"err", text:"As senhas não coincidem"});
    localStorage.setItem("livemode_pw_admin", next);
    setMsg({type:"ok", text:"Senha alterada com sucesso!"});
    setTimeout(onClose, 1200);
  }

  return (
    <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4"
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-slate-800 rounded-2xl border border-slate-600 p-6 w-full max-w-sm shadow-2xl">
        <h2 className="text-base font-bold text-slate-100 mb-4">🔑 Alterar Senha Admin</h2>
        <form onSubmit={submit} className="space-y-2.5">
          {[["Senha atual","password",current,setCurrent],
            ["Nova senha (mín. 4 char.)","password",next,setNext],
            ["Confirmar nova senha","password",confirm,setConfirm]
          ].map(([label, type, val, set]) => (
            <div key={label}>
              <label className="text-xs text-slate-400 mb-1 block">{label}</label>
              <input type={type} value={val} onChange={e=>{ set(e.target.value); setMsg(null); }}
                className="w-full px-3 py-2 bg-slate-700/60 border border-slate-600 rounded-xl text-sm text-slate-100 outline-none focus:border-slate-400"/>
            </div>
          ))}
          {msg && (
            <p className={`text-xs text-center ${msg.type==="ok"?"text-emerald-400":"text-red-400"}`}>{msg.text}</p>
          )}
          <div className="flex gap-2 pt-1">
            <button type="button" onClick={onClose}
              className="flex-1 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl text-sm transition-colors">
              Cancelar
            </button>
            <button type="submit"
              className="flex-1 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-sm font-semibold transition-colors">
              Salvar
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── HOME TAB ──────────────────────────────────────────────────────────────────
function Home({ team, agenda, broadcastData, logistics }) {
  const today = new Date().toISOString().split('T')[0];

  // Find display date: today if it has content, otherwise next active day
  const todayMatches = FIFA_MATCHES.filter(m => m.date === today);
  const todayAgenda  = agenda.filter(e => e.date === today && e.personId !== "__team__");
  const todayHasContent = todayMatches.length > 0 || todayAgenda.length > 0;

  let displayDate = today;
  if (!todayHasContent) {
    const allDates = [...new Set([
      ...FIFA_MATCHES.map(m => m.date),
      ...agenda.filter(e => e.personId !== "__team__").map(e => e.date)
    ])].sort();
    displayDate = allDates.find(d => d >= today) || allDates[allDates.length - 1] || today;
  }

  const isToday     = displayDate === today;
  const dayMatches  = FIFA_MATCHES.filter(m => m.date === displayDate);
  const dayAgenda   = agenda.filter(e => e.date === displayDate && e.personId !== "__team__");

  // LiveMode broadcast match for this day
  const livemodeMatch = dayMatches.find(m => broadcastData?.[m.id]?.enabled);

  // Cities where team is located today (from logistics hotels)
  const hotels = logistics?.hotels || [];
  const teamCitiesSet = new Set();
  team.forEach(p => {
    const hotel = hotels.find(h =>
      (h.personIds || []).includes(p.id) &&
      h.checkIn && h.checkOut &&
      displayDate >= h.checkIn && displayDate < h.checkOut
    );
    if (hotel?.city) teamCitiesSet.add(hotel.city);
  });
  const teamCities = [...teamCitiesSet];

  // Commitments: total vs done
  const totalCommitments = dayAgenda.length;
  const doneCommitments  = dayAgenda.filter(e => !!e.done).length;
  const pendingCommitments = totalCommitments - doneCommitments;
  const progressPct = totalCommitments > 0 ? Math.round((doneCommitments / totalCommitments) * 100) : 0;

  const dateObj  = new Date(displayDate + "T12:00:00");
  const dateStr  = dateObj.toLocaleDateString("pt-BR", { weekday:"long", day:"2-digit", month:"long" });

  return (
    <div className="space-y-4">

      {/* ── Date header ── */}
      <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl border border-slate-700 p-4">
        <div className="flex items-center justify-between gap-2 flex-wrap">
          <div>
            <div className="text-xs font-semibold text-emerald-400 uppercase tracking-wider mb-0.5">
              {isToday ? "Hoje" : "Próximo dia ativo"}
            </div>
            <div className="text-lg font-bold text-slate-100 capitalize">{dateStr}</div>
          </div>
          {teamCities.length > 0 && (
            <div className="flex items-center gap-1.5 flex-wrap justify-end">
              <span className="text-xs text-slate-500">📍 Equipa em:</span>
              {teamCities.map(c => (
                <span key={c} className="text-xs bg-slate-700 text-slate-200 px-2 py-0.5 rounded-full font-medium">{c}</span>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* ── KPIs do dia ── */}
      <div className="grid grid-cols-2 gap-3">
        {/* Compromissos */}
        <div className="bg-slate-800/70 rounded-2xl border border-slate-700/50 p-4">
          <div className="text-xs text-slate-400 mb-1">📋 Compromissos</div>
          <div className="flex items-end gap-2">
            <span className="text-3xl font-bold text-slate-100">{totalCommitments}</span>
            {totalCommitments > 0 && (
              <span className="text-sm text-slate-400 mb-0.5">total</span>
            )}
          </div>
          {totalCommitments > 0 && (
            <>
              <div className="flex items-center justify-between text-xs mt-2 mb-1">
                <span className="text-emerald-400">✓ {doneCommitments} feitos</span>
                <span className={pendingCommitments > 0 ? "text-amber-400" : "text-slate-500"}>

function Dashboard({ team }) {
  const coveredMatchIds = new Set(team.flatMap(p=>p.assignments));
  const cityPeople = {};
  team.forEach(p=>{
    p.assignments.forEach(mid=>{
      const m = FIFA_MATCHES.find(x=>x.id===mid);
      if (!m) return;
      if (!cityPeople[m.city]) cityPeople[m.city] = new Set();
      cityPeople[m.city].add(p.id);
    });
  });

  const stats = [
    {emoji:"👥",label:"Membros",value:team.length,color:"#3b82f6"},
    {emoji:"⚽",label:"Jogos Cobertos",value:coveredMatchIds.size,color:"#22c55e"},
    {emoji:"📋",label:"Total de Pautas",value:team.reduce((s,p)=>s+p.assignments.length,0),color:"#f59e0b"},
    {emoji:"🏙️",label:"Cidades",value:Object.keys(cityPeople).length,color:"#ec4899"},

    <div className="space-y-5">

        </div>
        {Object.keys(cityPeople).length===0
          ? <div className="py-8 text-center text-slate-500 text-sm">Atribua jogos para ver a cobertura</div>
          : Object.entries(cityPeople).sort((a,b)=>b[1].size-a[1].size).map(([city,pids])=>(
              <div key={city} className="px-4 py-2.5 flex items-center gap-3 border-b border-slate-700/30 last:border-0">
                <span className="text-sm text-slate-200 flex-1">📍 {city}</span>
                <div className="flex gap-1 flex-wrap justify-end">
                  {[...pids].map(pid=>{
                    const p=team.find(x=>x.id===pid); if(!p) return null;
                    return (
                      <span key={pid} style={{background:p.color+"33",color:p.color}}
                        className="text-xs px-2 py-0.5 rounded-full font-medium">
                        {p.name.split(" ")[0]}
                      </span>
                    );
                  })}
                </div>
              </div>
            ))
        }
      </div>
    </div>
  );
}

// ── SCHEDULE ─────────────────────────────────────────────────────────────────
function Schedule({ team, broadcastData, setBroadcastData, isAdmin }) {
  const [stageFilter, setStageFilter] = useState("Todos");
  const [cityFilter,  setCityFilter]  = useState("Todas");
  const [search,      setSearch]      = useState("");

  const filtered = FIFA_MATCHES.filter(m=>{
    if (stageFilter!=="Todos" && m.stage!==stageFilter) return false;
    if (cityFilter!=="Todas"  && m.city!==cityFilter)   return false;
    const searchable = `${tTeam(m.home)} ${tTeam(m.away)} ${m.home} ${m.away} ${m.city} ${m.venue}`.toLowerCase();
    if (search && !searchable.includes(search.toLowerCase())) return false;
    return true;
  });

  const grouped = {};
  filtered.forEach(m=>{ if (!grouped[m.date]) grouped[m.date]=[]; grouped[m.date].push(m); });

  return (
    <div className="space-y-3">
      <div className="flex flex-col gap-2 sm:flex-row">
        <div className="relative flex-1">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs">🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar seleção, cidade…"
            className="w-full pl-8 pr-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-200 placeholder-slate-500 outline-none focus:border-slate-500"/>
        </div>
        <select value={stageFilter} onChange={e=>setStageFilter(e.target.value)}
          className="px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-200 outline-none">
          <option value="Todos">Todos</option>
          {STAGE_ORDER.map(s=><option key={s} value={s}>{tStage(s)}</option>)}
        </select>
        <select value={cityFilter} onChange={e=>setCityFilter(e.target.value)}
          className="px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm text-slate-200 outline-none">
          {["Todas",...CITIES].map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      <div className="text-xs text-slate-500">{filtered.length} jogo{filtered.length!==1?"s":""}</div>

      {Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([date,matches])=>(
        <div key={date}>
          <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mt-4 mb-2">{fmtDate(date)}</div>
          <div className="space-y-2">
            {matches.map(m=>{
              const assignedTo = team.filter(p=>p.assignments.includes(m.id));
              const pt = ptTime(m.time, m.city);
              const bc = broadcastData?.[m.id] || {};
              function setBc(patch) {
                setBroadcastData(prev=>({...prev,[m.id]:{...prev[m.id],...patch}}));
              }
              return (
                <div key={m.id} className="rounded-xl p-3 border border-slate-700/50 bg-slate-800/60">
                  {/* Top row: number + stage badge + times */}
                  <div className="flex items-center gap-2 flex-wrap mb-1.5">
                    <span className="text-xs font-bold text-slate-500 font-mono">#{m.id}</span>
                    <Badge color={STAGE_COLORS[m.stage]||"#64748b"}>{tStage(m.stage)}</Badge>
                    <div className="flex items-center gap-1.5 text-xs text-slate-400 ml-auto flex-wrap justify-end">
                      <span>🕐 {m.time} <span className="text-slate-500">local</span></span>
                      <span className="text-slate-600">·</span>
                      <span>🇵🇹 {pt} <span className="text-slate-500">Portugal</span></span>
                    </div>
                  </div>
                  {/* Match */}
                  <div className="text-sm font-semibold text-slate-100">{tTeam(m.home)} <span className="text-slate-400">×</span> {tTeam(m.away)}</div>
                  <div className="text-xs text-slate-400 mt-0.5">📍 {m.venue} · {m.city}</div>
                  {assignedTo.length>0&&(
                    <div className="flex gap-1.5 mt-2 flex-wrap">
                      {assignedTo.map(p=>(
                        <span key={p.id} style={{background:p.color+"33",color:p.color}}
                          className="text-xs px-2 py-0.5 rounded-full font-medium">
                          {p.name.split(" ")[0]}
                        </span>
                      ))}
                    </div>
                  )}
                  {/* ── Broadcast / Emissão em Direto ── */}
                  {isAdmin ? (
                    <div className="mt-2.5 pt-2.5 border-t border-slate-700/50">
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-slate-400">📡 Emissão em direto</span>
                        <button onClick={()=>setBc({enabled:!bc.enabled})}
                          className={`relative inline-flex h-5 w-9 shrink-0 rounded-full border-2 border-transparent transition-colors ${bc.enabled?"bg-red-600":"bg-slate-600"}`}>
                          <span className={`inline-block h-4 w-4 rounded-full bg-white shadow transition-transform ${bc.enabled?"translate-x-4":"translate-x-0"}`}/>
                        </button>
                        <span className={`text-xs font-medium ${bc.enabled?"text-red-400":"text-slate-500"}`}>{bc.enabled?"Sim":"Não"}</span>
                      </div>
                      {bc.enabled&&(
                        <div className="space-y-1.5 mt-2">
                          <div className="flex gap-3 flex-wrap items-center">
                            <div className="flex items-center gap-1.5">
                              <span className="text-xs text-slate-400">🇵🇹 Pré-jogo (PT)</span>
                              <input type="time" value={bc.preGame||""} onChange={e=>setBc({preGame:e.target.value})}
                                className="text-xs bg-slate-700 border border-slate-600 rounded-lg px-2 py-1 text-slate-200 outline-none"/>
                            </div>
                            {bc.preGame&&<span className="text-xs text-slate-500">⏰ {localFromPT(bc.preGame,m.city)} local</span>}
                          </div>
                          <div className="flex gap-3 flex-wrap items-center">
                            <div className="flex items-center gap-1.5">
                              <span className="text-xs text-slate-400">🇵🇹 Fim pós-jogo (PT)</span>
                              <input type="time" value={bc.postGame||""} onChange={e=>setBc({postGame:e.target.value})}
                                className="text-xs bg-slate-700 border border-slate-600 rounded-lg px-2 py-1 text-slate-200 outline-none"/>
                            </div>
                            {bc.postGame&&<span className="text-xs text-slate-500">⏰ {localFromPT(bc.postGame,m.city)} local</span>}
                          </div>
                        </div>
                      )}
                    </div>
                  ) : bc.enabled ? (
                    <div className="mt-2.5 pt-2.5 border-t border-slate-700/50 space-y-1">
                      <span className="text-xs font-medium text-red-400">📡 Emissão em direto</span>
                      {bc.preGame&&(
                        <div className="flex gap-3 text-xs">
                          <span className="text-slate-400">⏱ Pré-jogo:</span>
                          <span className="text-slate-200">🇵🇹 {bc.preGame} PT</span>
                          <span className="text-slate-500">/ ⏰ {localFromPT(bc.preGame,m.city)} local</span>
                        </div>
                      )}
                      {bc.postGame&&(
                        <div className="flex gap-3 text-xs">
                          <span className="text-slate-400">🏁 Fim pós-jogo:</span>
                          <span className="text-slate-200">🇵🇹 {bc.postGame} PT</span>
                          <span className="text-slate-500">/ ⏰ {localFromPT(bc.postGame,m.city)} local</span>
                        </div>
                      )}
                    </div>
                  ) : null}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── TEAM ─────────────────────────────────────────────────────────────────────
const BLANK_FORM = {name:"",role:"",email:"",phone:"",color:PERSON_COLORS[0]};

function TeamTab({ team, setTeam, isAdmin }) {
  const [matchView, setMatchView] = useState(null);
  const [editId,    setEditId]    = useState(null);
  const [form,      setForm]      = useState(BLANK_FORM);
  const [sf,        setSf]        = useState("Todos");
  const [cf,        setCf]        = useState("Todas");

  const matchPerson = matchView ? team.find(p=>p.id===matchView) : null;

  function nextColor() { return PERSON_COLORS[team.length % PERSON_COLORS.length]; }

  function startEdit(p) {
    setEditId(p.id);
    setForm({name:p.name,role:p.role||"",email:p.email||"",phone:p.phone||"",color:p.color});
  }

  function cancelForm() {
    setEditId(null);
    setForm({...BLANK_FORM, color:nextColor()});
  }

  function savePerson() {
    if (!form.name.trim()) return;
    if (editId) {
      setTeam(prev=>prev.map(p=>p.id===editId?{...p,...form,name:form.name.trim(),role:form.role.trim()}:p));
      setEditId(null);
    } else {
      setTeam(prev=>[...prev,{id:_pid++,name:form.name.trim(),role:form.role.trim(),email:form.email.trim(),phone:form.phone.trim(),color:form.color,assignments:[],flight:"",hotel:""}]);
    }
    setForm({...BLANK_FORM, color:nextColor()});
  }

  function removePerson(id) {
    if (matchView===id) setMatchView(null);
    if (editId===id) cancelForm();
    setTeam(prev=>prev.filter(p=>p.id!==id));
  }

  function toggleMatch(personId, matchId) {
    setTeam(prev=>prev.map(p=>{
      if (p.id!==personId) return p;
      const has = p.assignments.includes(matchId);
      return {...p, assignments: has?p.assignments.filter(a=>a!==matchId):[...p.assignments,matchId]};
    }));
  }

  function updateField(personId, field, value) {
    setTeam(prev=>prev.map(p=>p.id===personId?{...p,[field]:value}:p));
  }

  function moveUp(id) {
    setTeam(prev=>{
      const i=prev.findIndex(p=>p.id===id); if(i<=0) return prev;
      const a=[...prev]; [a[i-1],a[i]]=[a[i],a[i-1]]; return a;
    });
  }
  function moveDown(id) {
    setTeam(prev=>{
      const i=prev.findIndex(p=>p.id===id); if(i<0||i>=prev.length-1) return prev;
      const a=[...prev]; [a[i],a[i+1]]=[a[i+1],a[i]]; return a;
    });
  }

  const filteredMatches = FIFA_MATCHES.filter(m=>{
    if (sf!=="Todos" && m.stage!==sf) return false;
    if (cf!=="Todas" && m.city!==cf)  return false;
    return true;
  });

  // ── Match assignment view ──
  if (matchPerson) return (
    <div className="space-y-4">
      <button onClick={()=>setMatchView(null)}
        className="flex items-center gap-1.5 text-sm text-slate-400 hover:text-slate-200 transition-colors">
        ← Voltar
      </button>

      <div className="bg-slate-800/70 rounded-2xl border border-slate-700/50 p-4">
        <div className="flex items-center gap-3 mb-4">
          <Avatar name={matchPerson.name} color={matchPerson.color} size="lg"/>
          <div className="flex-1 min-w-0">
            <div className="text-lg font-bold text-slate-100">{matchPerson.name}</div>
            <div className="text-sm text-slate-400">{matchPerson.role||"—"}</div>
          </div>
        </div>
        {isAdmin && (
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-slate-400 mb-1 block">✈️ Voo / Transfer</label>
              <input value={matchPerson.flight} onChange={e=>updateField(matchPerson.id,"flight",e.target.value)}
                placeholder="Ex: AA123 · GRU→JFK · 20 Jun"
                className="w-full px-3 py-2 bg-slate-700/50 border border-slate-600 rounded-xl text-sm text-slate-200 placeholder-slate-500 outline-none focus:border-slate-400"/>
            </div>
            <div>
              <label className="text-xs text-slate-400 mb-1 block">🏨 Hotel / Hospedagem</label>
              <input value={matchPerson.hotel} onChange={e=>updateField(matchPerson.id,"hotel",e.target.value)}
                placeholder="Ex: Marriott NYC · 23 Jun–2 Jul"
                className="w-full px-3 py-2 bg-slate-700/50 border border-slate-600 rounded-xl text-sm text-slate-200 placeholder-slate-500 outline-none focus:border-slate-400"/>
            </div>
          </div>
        )}
        {!isAdmin && (matchPerson.flight||matchPerson.hotel) && (
          <div className="grid sm:grid-cols-2 gap-2 text-xs text-slate-300 mt-2">
            {matchPerson.flight&&<div>✈️ {matchPerson.flight}</div>}
            {matchPerson.hotel&&<div>🏨 {matchPerson.hotel}</div>}
          </div>
        )}
      </div>

      <div className="bg-slate-800/70 rounded-2xl border border-slate-700/50 overflow-hidden">
        <div className="px-4 py-3 border-b border-slate-700/50 flex items-center justify-between flex-wrap gap-2">
          <span className="text-sm font-semibold text-slate-200">
            ⚽ {isAdmin?"Atribuir Jogos":"Jogos Atribuídos"}
            <span className="text-slate-500 font-normal ml-1">({matchPerson.assignments.length} selecionados)</span>
          </span>
          <div className="flex gap-2">
            <select value={sf} onChange={e=>setSf(e.target.value)}
              className="px-2 py-1 bg-slate-700 border border-slate-600 rounded-lg text-xs text-slate-200 outline-none">
              {["Todos",...STAGE_ORDER].map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={cf} onChange={e=>setCf(e.target.value)}
              className="px-2 py-1 bg-slate-700 border border-slate-600 rounded-lg text-xs text-slate-200 outline-none">
              {["Todas",...CITIES].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="px-2 py-1 max-h-96 overflow-y-auto no-scrollbar">
          {filteredMatches.map(m=>{
            const assigned = matchPerson.assignments.includes(m.id);
            if (!isAdmin && !assigned) return null;
            return (
              <div key={m.id}
                onClick={()=>isAdmin&&toggleMatch(matchPerson.id,m.id)}
                className={`flex items-center gap-2 py-2 px-2 rounded-lg transition-colors ${isAdmin?"hover:bg-white/5 cursor-pointer":""}`}>
                <span className="text-xs text-slate-400 w-14 shrink-0">{fmtDate(m.date)}</span>
                <span className="text-xs text-slate-400 w-10 shrink-0">{m.time}</span>
                <span className="text-xs font-medium text-slate-200 flex-1 truncate">{tTeam(m.home)} × {tTeam(m.away)}</span>
                <span className="text-xs text-slate-500 truncate max-w-[90px] hidden sm:block">{m.city}</span>
                <div className={`w-5 h-5 rounded border flex items-center justify-center shrink-0 transition-colors ${assigned?"bg-emerald-500 border-emerald-500":"border-slate-500"}`}>
                  {assigned&&<span className="text-white text-xs font-bold">✓</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );

  // ── Main list + form ──
  return (
    <div className="space-y-4">
      {/* Add/Edit form — admin only */}
      {isAdmin && (
        <div className="bg-slate-800/70 rounded-2xl border border-slate-700/50 p-4">
          <h3 className="text-sm font-semibold text-slate-200 mb-3">
            {editId?"✏️ Editar Membro":"+ Adicionar Membro"}
          </h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-3">
            {[["Nome completo *","text",form.name,v=>setForm(f=>({...f,name:v}))],
              ["Função (ex: Câmera)","text",form.role,v=>setForm(f=>({...f,role:v}))],
              ["E-mail (opcional)","email",form.email,v=>setForm(f=>({...f,email:v}))],
              ["WhatsApp / Telefone","tel",form.phone,v=>setForm(f=>({...f,phone:v}))]
            ].map(([ph,type,val,set])=>(
              <input key={ph} type={type} value={val} onChange={e=>set(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&savePerson()} placeholder={ph}
                className="px-3 py-2 bg-slate-700/50 border border-slate-600 rounded-xl text-sm text-slate-200 placeholder-slate-500 outline-none focus:border-slate-400"/>
            ))}
          </div>
          <div className="mb-4">
            <label className="text-xs text-slate-400 mb-2 block">🎨 Cor do Avatar</label>
            <ColorPicker value={form.color} onChange={c=>setForm(f=>({...f,color:c}))}/>
          </div>
          <div className="flex gap-2 justify-end">
            {editId&&(
              <button onClick={cancelForm}
                className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl text-sm transition-colors">
                Cancelar
              </button>
            )}
            <button onClick={savePerson} disabled={!form.name.trim()}
              className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl text-sm font-medium transition-colors">
              {editId?"Salvar Alterações":"Adicionar"}
            </button>
          </div>
        </div>
      )}

      {/* Team cards */}
      <div className="space-y-2">
        {team.length===0&&(
          <div className="py-10 text-center text-slate-500 text-sm">
            {isAdmin?"Nenhum membro ainda. Adicione acima.":"Nenhum membro cadastrado."}
          </div>
        )}
        {team.map(p=>{
          const cities=[...new Set(FIFA_MATCHES.filter(m=>p.assignments.includes(m.id)).map(m=>m.city))];
          return (
            <div key={p.id}
              style={editId===p.id?{borderColor:p.color+"66"}:{}}
              className="bg-slate-800/70 rounded-2xl border border-slate-700/50 p-4 transition-colors">
              <div className="flex items-start gap-3">
                <Avatar name={p.name} color={p.color}/>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-semibold text-slate-200">{p.name}</span>
                    {p.role&&<span className="text-xs bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full">{p.role}</span>}
                  </div>
                  {(p.email||p.phone)&&(
                    <div className="text-xs text-slate-500 mt-1 flex gap-3 flex-wrap">
                      {p.email&&<span>✉️ {p.email}</span>}
                      {p.phone&&<span>📱 {p.phone}</span>}
                    </div>
                  )}
                  <div className="mt-1.5 flex gap-2 flex-wrap items-center">
                    <span className="text-xs font-medium" style={{color:p.color}}>
                      {p.assignments.length} jogo{p.assignments.length!==1?"s":""}
                    </span>
                    {cities.length>0&&<span className="text-xs text-slate-500">· {cities.join(" · ")}</span>}
                  </div>
                  {(p.flight||p.hotel)&&(
                    <div className="mt-1 text-xs text-slate-500 flex gap-2 flex-wrap">
                      {p.flight&&<span>✈️ {p.flight}</span>}
                      {p.hotel&&<span>🏨 {p.hotel}</span>}
                    </div>
                  )}
                </div>
                <div className="flex gap-1.5 shrink-0 mt-0.5">
                  {isAdmin&&(
                    <>
                      <div className="flex flex-col gap-0.5">
                        <button onClick={()=>moveUp(p.id)} title="Mover para cima"
                          className="w-6 h-5 flex items-center justify-center bg-slate-700 hover:bg-slate-600 text-slate-400 hover:text-slate-200 rounded text-xs leading-none transition-colors">▲</button>
                        <button onClick={()=>moveDown(p.id)} title="Mover para baixo"
                          className="w-6 h-5 flex items-center justify-center bg-slate-700 hover:bg-slate-600 text-slate-400 hover:text-slate-200 rounded text-xs leading-none transition-colors">▼</button>
                      </div>
                      <button onClick={()=>startEdit(p)} title="Editar perfil"
                        className="px-2.5 py-1.5 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg text-xs transition-colors">✏️</button>
                      <button onClick={()=>setMatchView(p.id)} title="Atribuir jogos"
                        className="px-2.5 py-1.5 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg text-xs transition-colors">⚽</button>
                      <button onClick={()=>removePerson(p.id)} title="Remover"
                        className="p-1.5 text-slate-500 hover:text-red-400 transition-colors">🗑</button>
                    </>
                  )}
                  {!isAdmin&&(
                    <button onClick={()=>setMatchView(p.id)} title="Ver jogos"
                      className="px-2.5 py-1.5 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg text-xs transition-colors">⚽ Ver jogos</button>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

const PITCH_POSITIONS_CATALOG = [
  // Chegadas

function generateDates(from, to) {
  const out=[]; const d=new Date(from+"T12:00:00"); const end=new Date(to+"T12:00:00");
  while(d<=end){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return out;
}
